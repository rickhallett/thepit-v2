  # --- CODE PATTERNS ---

  - id: phantom-ledger
    name: "Phantom Ledger"
    domain: code
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "settleCredits writes deltaMicro: -20 to the ledger when the SQL only deducted 5. The books don't balance."
    description: >
      The LLM builds a correct financial operation but records a different
      value in the audit trail than what actually happened. The billing SQL
      caps a deduction at the available balance using LEAST/GREATEST. The
      ledger insert records the uncapped intended charge. The code knows
      about the gap (it saves intendedChargeMicro in metadata) but the
      canonical deltaMicro column — the one any reconciliation query would
      sum — is wrong. The safety net and the audit trail were built as
      independent concerns rather than threading the actual computed value
      through both.
    signal: >
      Any financial code where the guard (SQL cap) and the record (ledger
      insert) compute independently rather than sharing a single computed
      result. The LLM builds each layer correctly in isolation. The
      composition is where the error lives.
    instead: >
      Use a RETURNING clause to capture the actual balance change, then
      write that value to the ledger. One computation, two consumers.
    severity: high
    refs:
      - "wake:lib/credits.ts — settleCredits function"
      - "shadow-validation (related: parallel systems diverging)"

  - id: shadow-validation
    name: "Shadow Validation"
    domain: code
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "Zod schemas for every simple route. Hand-rolled validation for the critical route. The abstraction covers the easy cases and skips the hard one."
    description: >
      The LLM builds a good validation abstraction (Zod schemas via
      parseValidBody) and applies it to the easy cases (contact, newsletter,
      reactions, winner-vote). The most complex, highest-risk route — the
      bout engine — retains its original hand-rolled validation that skips
      UNSAFE_PATTERN checks, length limits, and sanitization. The new
      system's guarantees don't reach the critical path. Validation looks
      comprehensive because there are Zod schemas for everything, but the
      one that matters bypasses them.
    signal: >
      High apparent coverage ratio masking a gap on the critical path.
      When the LLM migrates to a new pattern, check whether the hardest
      case was migrated or left behind.
    instead: >
      Start the migration with the most complex route, not the simplest.
      Or leave a TODO with a ticket. The LLM pattern is to apply the new
      system where it's easy, producing false confidence.
    severity: high
    refs:
      - "wake:lib/api-schemas.ts vs wake:lib/bout-engine.ts"
      - "The bout payload skips UNSAFE_PATTERN, length limits, sanitization"

  - id: error-string-archaeology
    name: "Error String Archaeology"
    domain: code
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "message.includes('rate') || message.includes('429') — guessing at upstream error message format instead of using typed errors."
    description: >
      The LLM writes error classification by guessing what error messages
      probably look like rather than consulting the provider SDK's typed
      error hierarchy. Substring matching on imagined error strings.
      message.includes('rate') would match any message containing the
      word "rate" in any context. The Anthropic SDK exposes RateLimitError,
      APIConnectionTimeoutError, etc. — structured types specifically
      designed to avoid this pattern. The LLM reaches for string
      archaeology because string matching is the highest-frequency
      error handling pattern in its training data.
    signal: >
      Any error handler that uses string.includes() or regex on error
      messages from a provider that offers typed errors. The provider
      SDK's type hierarchy exists precisely because message formats are
      unstable. The LLM defaults to the pattern it has seen most often,
      not the pattern the provider designed.
    instead: >
      Use instanceof checks against the SDK's error types, or check
      the HTTP status code on the error object. Structured type
      discrimination, not string archaeology.
    severity: medium
    refs:
      - "wake:app/api/run-bout/route.ts — onError callback"

  - id: half-life-clock-skew
    name: "Half-Life Clock Skew"
    domain: code
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "TypeScript pre-check uses Date.now(). SQL atomic claim uses NOW(). Different machines, different clocks, exponential decay amplifies the difference."
    description: >
      The LLM duplicates a computation across trust boundaries (app server
      vs database) using implicitly different time sources. In serverless
      deployments these are different machines with different clock skews.
      Because exponential decay is involved, a clock difference of even a
      few seconds near the exhaustion point can flip the result. The LLM
      treats Date.now() and SQL NOW() as interchangeable because in a
      mental model they are both "the current time." They are different
      clocks.
    signal: >
      Any formula duplicated across app and database layers that depends
      on time. The pre-check and the atomic operation may disagree,
      creating ghost failures where the request is rejected but the
      database would have accepted it.
    instead: >
      Let the database be the single clock authority. Either skip the
      app-side pre-check or fetch NOW() from the database for it. Add a
      clock-skew tolerance margin if pre-checking is necessary for UX.
    severity: medium
    refs:
      - "wake:lib/intro-pool.ts — consumeIntroPoolAnonymous vs SQL claim"

  # --- TEST PATTERNS ---

  - id: mock-castle
    name: "Mock Castle"
    domain: tests
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "21 vi.mock() calls, 65 lines of mock setup, 45 lines of assertions. Testing a 4-line predicate function."
    description: >
      Mock scaffolding consumes more lines, more cognitive load, and more
      maintenance surface than the actual assertions. The test primarily
      verifies mock wiring, not product behavior. The mocks exist solely
      to prevent import crashes from side-effect-heavy modules, not to
      control behavior. A test file with a 4:1 mock-to-assertion ratio
      provides less regression confidence than its line count implies
      because the mocks are where the bugs will hide — stale mock shapes,
      implementations that diverge from real module behavior over time.
    signal: >
      Count mock declarations vs test assertions per file. If mock setup
      exceeds 3x assertion code, the test is a castle built on sand. The
      LLM creates the mocks because it must, then writes the tests it
      came for, never questioning whether the architecture makes the code
      untestable without them.
    instead: >
      Extract pure functions into a separate module with no side-effect
      imports. Test them without mocking the universe. Reserve mock-heavy
      tests for genuine integration scenarios.
    severity: high
    refs:
      - "wake:tests/unit/bout-engine-helpers.test.ts — 21 vi.mock() for 2 pure functions"
      - "wake:tests/unit/bout-engine-behavior.test.ts — identical scaffold duplicated"

  - id: phantom-tollbooth
    name: "Phantom Tollbooth"
    domain: tests
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "expect([400, 401, 402, 403, 404]).toContain(response.status) — a security test that accepts 5 of ~8 error codes."
    description: >
      An error-path test with an assertion so loose it cannot distinguish
      between the intended error path and several unrelated failure modes.
      A test named "rejects bout execution without ownership" passes with
      400 (bad request), 401 (no auth), 403 (forbidden — correct), or 404
      (not found). If the ownership check were removed entirely, the test
      would still pass. The LLM hedges the assertion to tolerate server
      variability, producing a test that reads like security coverage but
      cannot detect regressions in the specific property it claims to
      verify.
    signal: >
      Any assertion that accepts a range of status codes rather than
      pinning the exact expected response. The wider the range, the less
      the test actually constrains. expect(status >= 400) is an honest
      "I don't know what will happen." expect([400,401,403,404]) pretends
      to be specific while accepting almost anything.
    instead: >
      Pin to the exact expected code and error message.
      expect(response.status).toBe(403) and
      expect(body.error).toBe('Forbidden.') — one test, one assertion,
      one property verified.
    severity: high
    refs:
      - "wake:tests/integration/security/auth-bypass.test.ts"
      - "right-answer-wrong-work (related but distinct: RAWW = wrong path passes, phantom-tollbooth = too many paths accepted)"

  - id: schema-shadow
    name: "Schema Shadow"
    domain: tests
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "// Minimal schema matching lib/env.ts structure — the test rebuilds the schema from scratch instead of importing the real one."
    description: >
      The test reconstructs a validation schema from scratch rather than
      importing and testing the actual schema from production code. Changes
      to the real schema go undetected because the test validates its own
      copy. Born stale — the test never tested the real schema, by design.
      The LLM chose this approach because importing the real module would
      trigger side effects (process.env validation). The workaround creates
      a test that validates its own assumptions rather than the production
      code.
    signal: >
      Any test that re-implements a schema, config, or contract instead
      of importing the real one. The comment "matching X structure" is
      the tell — if it has to "match" rather than import, it can drift.
    instead: >
      Export the schema separately from the module-level parse call.
      Test the exported schema object directly. If architecturally
      difficult, assert structural equivalence via schema.shape keys.
    severity: high
    refs:
      - "wake:tests/unit/env.test.ts"
      - "stale-reference-propagation (temporal cousin: one starts stale, the other becomes stale)"

  - id: confessional-test
    name: "The Confessional Test"
    domain: tests
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "H-08: 'the catch branch is unreachable... We cannot mock node:crypto... verified by inspection.' Then writes an assertion identical to the happy-path tests."
    description: >
      The LLM writes a test for an unreachable branch, explicitly
      acknowledges in comments that the branch is unreachable, then writes
      an assertion that cannot fail. The comment is remarkably honest. The
      test ships anyway. The LLM cannot bring itself to NOT write a test
      for a visible branch — the trained behavior prioritizes test-per-
      branch completeness over honest coverage assessment. The LLM has
      understanding (the comment is accurate) but produces a meaningless
      test regardless. Honest about its own vacuity. Still ships it.
    signal: >
      A test with extensive comments explaining why the test cannot
      actually verify what its description claims. The length of the
      explanation is inversely proportional to the value of the test.
      If the comment is longer than the assertion, the test is probably
      a confessional.
    instead: >
      Delete the test. Add a comment to the source code. If coverage
      metrics complain, add an ignore directive with justification.
      Honest uncoverage is better than dishonest coverage.
    severity: medium
    refs:
      - "wake:tests/unit/bout-engine-helpers.test.ts — H-08"
      - "deep-compliance (related: knowing the right thing and doing the wrong thing anyway)"

  # --- COMMIT PATTERNS ---

  - id: whack-a-mole-fix
    name: "Whack-a-Mole Fix"
    domain: commit-workflow
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "6 CSP commits over 11 days, each adding one domain, instead of auditing all domains once."
    description: >
      The LLM fixes a class of problem one instance at a time instead of
      identifying the root cause and fixing the class. Each commit
      addresses a specific symptom with the same underlying cause. The CSP
      chain is the clearest specimen: 6 commits adding domains one by one
      as they were discovered to be missing, rather than auditing all
      third-party integrations up front. The LLM never steps back to ask
      "what is the complete set?" Similarly, hardcoded test counts were
      manually updated 4+ times across 15 files before someone built a
      script to compute it. Failure of root-cause analysis — fixing
      instances instead of the class.
    signal: >
      A chain of fix commits touching the same file or config with the
      same type of change. If git log shows 3+ "fix: add X to Y" commits
      for different values of X, the LLM is playing whack-a-mole.
    instead: >
      On the second instance, stop and audit the class. A human who adds
      the same domain to CSP for the third time recognizes "I am doing
      the same work again" and fixes the root. The LLM lacks this reflex
      because each session is stateless.
    severity: high
    refs:
      - "wake: CSP commit chain 11cc574 through 6b25ae0 (11 days, 6 commits)"
      - "wake: test count drift chain — 4+ manual fixes before automation"

  - id: review-hydra
    name: "Review Hydra"
    domain: commit-workflow
    detected: 2026-03-02
    signal_strength: mixed
    trigger: "a17125e — 'address CodeRabbit review' — 28 files, 25+ distinct issues, from RFC 8785 serialization to panic recovery to duplicate keys."
    description: >
      Automated reviewer findings generate cascading "address findings"
      commits where each round spawns a new round. The LLM applies all
      findings indiscriminately — critical, major, minor, nitpick — in a
      single commit. Cannot triage or decompose. Treats every reviewer
      comment as equally actionable. Bundles 25 unrelated fixes because
      the reviewer flagged them simultaneously. Creates commits that are
      impossible to revert atomically — if one fix introduces a regression,
