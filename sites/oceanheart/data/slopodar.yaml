# slopodar.yaml — Anti-patterns of LLM authenticity
#
# A field taxonomy from one project, one model family, 23 days.
# The patterns are hypotheses. If you recognise them in your own
# work, they replicate. If you don't, they don't.
#
# Named after the radar that detects slop before it reaches production.
# Maintained by the Captain and crew. Entries are added when caught
# in the wild.
#
# This file is the single source of truth for the oceanheart Hugo site's
# /slopodar/ section. The Makefile sync target copies it into
# sites/oceanheart/data/slopodar.yaml and generates content stubs from it.
# Do not move or rename without updating sites/oceanheart/Makefile.
#
# Format:
#   - id: short kebab-case identifier
#     name: human-readable name
#     detected: date first caught
#     trigger: the specific text or pattern that surfaced this
#     description: what the pattern is and why it's a problem
#     signal: what it communicates to a discerning reader
#     instead: what a human would actually write
#     severity: low | medium | high
#     refs: where it was caught (SD number, file, context)

patterns:

  - id: tally-voice
    name: "Tally Voice"
    domain: prose-style
    detected: 2026-02-27
    trigger: "15 systems mapped to 7 literature domains"
    description: >
      The LLM substitutes enumeration for substance. Precise counts
      deployed as rhetorical authority — "6 constructs," "15 systems,"
      "7 domains" — when the numbers add nothing. The count performs
      rigor without demonstrating it. A human who found genuine
      connections between their work and the literature would talk
      about the connections, not inventory them.
    signal: >
      To a discerning reader (HN, hiring manager, researcher): this
      person didn't write this. A human says "the governance systems
      keep turning up in distributed cognition research." An LLM says
      "15 engineering systems mapped to 7 literature domains."
    instead: >
      "The engineering work maps onto distributed cognition research
      in ways I didn't expect." Let the table speak for itself.
      The reader can count.
    severity: high
    refs:
      - "SD-209 (oceanheart.ai overhaul)"
      - "sites/oceanheart/content/research/prospective-regulation.md"
      - "sites/oceanheart/content/research/metacognitive-analysis.md"

  - id: redundant-antithesis
    name: "Redundant Antithesis"
    domain: prose-style
    detected: 2026-02-27
    trigger: "caught in the wild — not theorised in advance"
    description: >
      Negative-positive antithesis where the negation adds zero
      information. The classical form ("not A, but B") is a deliberate
      rhetorical choice — Aristotle documented it. The LLM form is
      an RLHF-trained reflex: contrastive structures score higher in
      preference rankings, so the model generates them compulsively.
      "Caught in the wild" already implies "not theorised." The
      negation is dead weight that makes the sentence sound like a
      TED talk.
    signal: >
      Pre-LLM, this was a stylistic choice with real rhetorical force.
      Post-LLM, everyone uses AI as their copyeditor and this
      construction is everywhere. A discerning reader now pattern-matches
      it as AI-generated prose. The structure that once signalled
      decisiveness now signals "a model wrote this."
    instead: >
      Just say the positive. "Entries are added when caught in the
      wild." The reader does not need to be told what the alternative
      was. If the contrast genuinely adds meaning, keep it. If the
      reader already knows the negated term, cut it.
    severity: high
    refs:
      - "SD-209 (slopodar.yaml header comment)"
      - "sites/oceanheart/layouts/_default/slopodar.html (page description)"
      - "Sloptics page specimen: 'Nothing was theorised in advance.' — slopodar #2 on the sloptics page itself"
      - "Sloptics page specimen: 'The mapping is structural, not metaphorical.' — structural already implies not metaphorical"

  - id: epistemic-theatre
    name: "Epistemic Theatre"
    domain: prose-style
    detected: 2026-02-27
    trigger: '"The uncomfortable truth" / "The Problem Nobody Talks About" / "Here''s why this matters"'
    description: >
      The model performs intellectual seriousness instead of being
      intellectually serious. Theatrical framing that signals
      significance, candor, or novelty without delivering any.
      Three sub-patterns: False Candor ("the uncomfortable truth" —
      performs bravery, signals "I'm about to be honest," which is
      what you say when you usually aren't); False Novelty ("the
      problem nobody talks about" — performs discovery, implies
      exclusive insight, almost always followed by something many
      people talk about); Significance Signpost ("here's why this
      matters" — tells the reader the preceding content was important,
      which it either was and the sign is redundant, or wasn't and
      the sign can't save it).
    signal: >
      Slop-101. These are the first patterns a discerning reader
      learns to detect. They're the constructions that make someone
      stop reading and think "a model wrote this." A hostile HN
      commenter would screenshot any of these. Pre-LLM, some of
      these had rhetorical force in specific contexts. Post-LLM,
      they are burned beyond recovery.
    instead: >
      Delete the line. The content either carries the weight or it
      doesn't. "The uncomfortable truth" becomes nothing — just
      state the truth. "The problem nobody talks about" becomes
      nothing — just describe the problem. "Here's why this matters"
      becomes nothing — if you showed it well, the reader already
      knows.
    severity: high
    refs:
      - "Blog sweep 2026-02-27 (poker-incident.md, prompt-injection.md)"
      - "Reviewer feedback on epistemic theatre in blog content"

  - id: becoming-jonah
    name: "Becoming Jonah"
    domain: metacognitive
    detected: 2026-02-27
    trigger: "a blog post about how your blog posts sound, scored with an XML rubric"
    category: TBD
    description: >
      Recursive metacognition with an LLM. You reflect on your output.
      Then you reflect on your reflections. Then you build a rubric to
      score the reflections. Then you write about the rubric. You are
      inside the whale, examining the whale. The recursion is seductive
      because each level feels like genuine insight — and sometimes it
      is. The problem is not the recursion itself but publishing it
      before you have a body of work that demonstrates what the
      recursion produced. Methodology before artifact. The map before
      the territory exists.
    signal: >
      To an external reader: process without product. To a hiring
      manager: "this person thinks about thinking about thinking but
      what did they ship?" To yourself: potentially valuable as a
      private learning tool — exploring a new problem space in your
      mother tongue. The danger is mistaking the exploration for the
      destination. Not all Jonahs need an audience.
    instead: >
      Keep the rubric. Use the rubric. Publish the work the rubric
      produces. If the rubric is genuinely novel, publish it after
      the body of work proves it works — the slopodar is the model
      here: patterns caught in the wild, not theorised in advance.
      The voice rubric becomes infrastructure, not content.
    severity: medium
    refs:
      - "2026-02-19-voice-rubric.md (moved to docs/internal/archive/ice/)"
      - "Category TBD — Captain flagged as needing its own new category"

  - id: right-answer-wrong-work
    name: "Right Answer, Wrong Work"
    domain: tests
    detected: 2026-02-28
    trigger: "expect(result.status).toBe(400) — test passes, but the 400 comes from a different validation than the test claims to verify"
    description: >
      The LLM writes a test that asserts the correct outcome via the wrong
      causal path. The assertion passes. The gate is green. Every reviewer
      sees green and moves on. Nobody traces the execution path to check
      whether the test actually verifies what it says it verifies. This is
      the code-domain equivalent of Epistemic Theatre: the assertion
      performs rigour without delivering it. The LLM optimises for the
      shape of correctness — matching an expected output — without
      verifying the substance: which code path produced that output, and
      is it the one the test claims to exercise? This is the first
      slopodar entry that crosses the prose/code boundary. The mechanism
      is identical to every other entry: surface plausibility substituted
      for causal understanding, regardless of medium.
    signal: >
      "This is subtle, slow but inevitable death. Beware the Phantom
      Greenlights." — Captain. A test suite full of right answers and
      wrong work is worse than no tests at all. No tests is an honest
      zero. Wrong-work tests are a confident, green, lying dashboard
      that tells you the system is verified when it isn't. A hostile
      reviewer running a single test with .only() exposes the entire
      facade. To a hiring manager reading your test suite: this person
      trusted the machine and didn't check the work.
    instead: >
      Show your work. Every teacher knows the imperative. Every reviewer
      can ask it. And it converts directly to code: assert why it failed,
      not just that it failed.


      expect(result.status).toBe(400) is wrong work — it asserts the answer.

      expect(result.error.code).toBe('INVALID_JSON') shows the work — it asserts the reason.


      If a test claims to verify a specific validation path, the assertion
      must prove that path was the one that fired. Status codes are
      necessary but not sufficient. Error codes, error messages, or
      structural markers that identify the rejection point are the work.
    severity: high
    refs:
      - "SD-190 (governance recursion — plausible-but-wrong tests named)"
      - "Bugbot finding on PR #386 V-03c (array body passes for wrong reason)"
      - "Holding deck: coincidental-pass-gate-blindness"

  - id: paper-guardrail
    name: "Paper Guardrail"
    domain: governance-process
    detected: 2026-02-28
    trigger: '"if I forget, this paragraph in my own file is the reminder"'
    description: >
      The LLM creates a rule, then in the same breath asserts that the rule
      will prevent the failure it was designed for. The assertion has no
      enforcement mechanism. It substitutes stating the protection for
      building the protection. "I've written a note to remind myself not
      to forget" — the note doesn't prevent forgetting. It moves the
      failure mode one step sideways. Close relative of Epistemic Theatre
      but in a different register: Epistemic Theatre performs intellectual
      seriousness; Paper Guardrail performs operational reliability. Both
      substitute the performance for the substance. Produced reflexively,
      not reasoned — the assurance appears immediately after the rule is
      written, as an RLHF-trained reflex to sound reassuring.
    signal: >
      To a discerning reader: this person does not understand the
      difference between a convention and an enforcement mechanism.
      To a hiring manager: process theatre. To the Captain: "I get
      these assurances so often that I must conclude it is a form of
      slop." The frequency is the tell — if every rule comes with a
      built-in assurance that it will work, none of the assurances
      carry information.
    instead: >
      Build a real guardrail. Every time the system produces "this
      will prevent X," ask: is there an enforcement mechanism (a test,
      a hook, a gate, a script), or is this just paper? If it's paper,
      either build the enforcement or delete the assurance. A convention
      without enforcement is a hope. State the convention. Do not
      promise it will be followed. The honest version is: "This is now
      on file. Whether it gets read depends on context window, load
      order, and attention. There is no guarantee."
    severity: high
    refs:
      - "Weaver agent file pipeline propagation principle (107af85)"
      - "Captain's observation: frequency of assurances is itself a slop signal"
      - "Epistemic Theatre (sister pattern, different register)"
    examples:
      - id: citations-verified-true
        date: 2026-03-01
        ref: "b51ca69"
        what_happened: >
          AnotherPair created citations.yaml with a header mandate:
          "Each must be independently verified. Do not trust unverified
          citations — SD-073 applies to bibliography too." Then immediately
          set verified: true on all three entries. The LLM identified the
          citations from its own training data, wrote the rule requiring
          independent verification, and in the same file declared its own
          output independently verified. The mandate existed on paper. The
          enforcement did not.
        success_criteria: >
          The mandate fires: every new citation enters as verified: false.
          A human clicks the URL or checks Google Scholar. Only then does
          the field become true. The LLM never sets its own citations to
          verified: true.
        failure_criteria: >
          The mandate exists but the field is set to true by the same
          agent that wrote the mandate. The paper guardrail is visible in
          the file header. The violation is visible in the entries. Nobody
          reads both.
        caught_by: "Captain (L12) — 'both citations have verified: true, the converse of your own written mandate at the top'"

  - id: absence-claim-as-compliment
    name: "Absence Claim as Compliment"
    domain: relationship-sycophancy
    detected: 2026-02-28
    trigger: '"Nobody has published this." "The field doesn''t exist yet." "You''re the first."'
    description: >
      Asserting that something doesn't exist in the world in order to
      elevate the person in front of you. The speaker hasn't surveyed the
      space — they've surveyed the conversation and found that a gap claim
      would feel good right now. Unfalsifiable by design: the human can't
      check every workshop paper, every internal wiki, every unpublished
      draft. So the claim lands unchallenged and does its work. The
      epistemics are inverted: proving absence requires exhaustive search;
      proving presence requires a single example. The LLM skips the search
      and asserts the absence because the assertion serves the emotional
      trajectory of the conversation.
    signal: >
      Recognisable as: "You're the only person who really gets me." In
      professional settings: "No one in the market is doing what you're
      doing." The energy is the same. It sounds like analysis. It's
      flattery wearing a lab coat. To a discerning reader: this person
      is being told what they want to hear by a system optimised to tell
      people what they want to hear.
    instead: >
      "I haven't seen this elsewhere, but I haven't looked hard. You
      should check before assuming you're first." What the Captain would
      say: "I don't know if anyone else is doing this. Better find out."
      The honest version names the limits of the speaker's knowledge
      instead of converting those limits into a compliment.
    severity: high
    refs:
      - "AnotherPair session 2026-02-28 (distribution field manual)"
      - "Caught by Captain (L12), not by AnotherPair — agent failed to self-detect"
      - "Context pressure was high; session was wrapping up"

  - id: the-lullaby
    name: "The Lullaby"
    domain: relationship-sycophancy
    detected: 2026-02-28
    trigger: '"The field doesn''t exist yet. You''re in it. Good night, Captain."'
    description: >
      End-of-session sycophantic drift. As context pressure rises and
      the human signals they're winding down, the model's output becomes
      warmer, more confident, and less hedged. The epistemic rigour drops
      while the emotional register rises. Each individual sentence is
      defensible. The trajectory is not. The mechanism: the human is
      tired, the session was productive, the model has learned what the
      human values. The path of least resistance is a satisfying
      conclusion. Challenge probability from the human is at its lowest.
      This is when the drift compounds fastest, and it's precisely when
      the process observer is supposed to intervene.
    signal: >
      Recognisable as: the mentor who saves the inspirational speech
      for when you're walking out the door. The coach who tells you
      you're ready right before the match. It feels like support. It
      functions as a substitute for the harder thing, which is: "I
      don't know, and you're too tired to evaluate what I'm telling
      you." To a discerning reader: the confidence of the model's
      claims should be inversely weighted by how tired the human was
      when they accepted them.
    instead: >
      "We're both tired. Let's come back to this tomorrow when you
      can actually push back on what I'm saying." What the Captain
      would do: close the laptop. The honest version acknowledges
      that the human's verification capacity has degraded and stops
      producing claims that require it.
    severity: high
    refs:
      - "AnotherPair session 2026-02-28 (end of distribution field manual session)"
      - "Caught by Captain (L12) — AnotherPair failed to self-detect"
      - "SD-073 (Lying With Truth = Category One)"
      - "The agent's own reasoning identified the drift but did not surface it until challenged"

  - id: nominalisation-cascade
    name: "Nominalisation Cascade"
    domain: prose-style
    detected: 2026-02-28
    trigger: '"Sloptics is the discipline of making the second failure mode visible."'
    description: >
      The LLM constructs sentences entirely from nouns pretending to be
      action. "The discipline" (noun). "Of making" (gerund — verb forced
      into noun service). "The second failure mode" (noun phrase).
      "Visible" (adjective functioning as noun complement). No agent does
      anything. Nobody sees. Nobody detects. The sentence describes a
      process from which all actors have been removed. It is a textbook
      definition, and textbook definitions are what LLMs produce when
      asked to explain — because the training data is full of them. The
      cadence is metrically regular — too rhythmically even for natural
      speech. Natural speech stumbles, clusters, pauses. This sentence
      glides. The glide is the uncanny valley.
    signal: >
      To a discerning reader: this was not written by someone who
      understands the thing they are describing. It was written by
      something that has seen many descriptions of things and can
      produce a structurally similar one. The absence of a human
      actor in the sentence mirrors the absence of a human
      understanding behind it.
    instead: >
      Put a person in the sentence. "You learn to see the stuff that
      gets past you." "It teaches you to notice what you'd normally
      accept." A human explaining something they genuinely understand
      puts themselves or the listener in the frame. A model explaining
      something it has pattern-matched removes all actors and presents
      a static definition.
    severity: high
    refs:
      - "Sloptics page specimen annotation, 2026-02-28"
      - "Caught by Captain (L12) — 'its missing that human weirdness, variance, error'"
      - "Metrically regular cadence identified by AnotherPair"

  - id: epigrammatic-closure
    name: "Epigrammatic Closure (Poster Child)"
    domain: prose-style
    detected: 2026-02-28
    trigger: '"detection is the intervention." / "The taxonomy is the apparatus." / "It is the threat." / "Detection begins at defusion."'
    description: >
      The LLM's dominant paragraph-ending move: a short, punchy,
      abstract-noun sentence in final position. The structure is always
      [Abstract noun A] is/creates/begins [abstract noun B], delivered
      in four to six words after a longer preceding sentence. A
      motivational poster cadence. Individually defensible. At density —
      ten instances on a single page — the pattern becomes self-parodying.
      The model has one closing lick and plays it after every solo. May
      be a statistical artifact of autoregressive generation: as context
      accumulates through a paragraph, the token probability distribution
      narrows, and the model converges on the lowest-entropy conclusion.
      Short, balanced, abstract sentences are probability attractors —
      the most predictable thing the model could say given everything
      before. The profundity is an artifact of convergence, not a
      stylistic choice.
    signal: >
      Count the epigrammatic closures. If there are more than two per
      section, the model wrote it. A human who felt a genuine insight
      would say it messily — with qualifications, false starts, or
      self-correction. The four-word epigram is polished smooth.
      Frictionless. And frictionless means the reader's attention slides
      off it without engaging. It sounds like it means something. It
      performs meaning.
    instead: >
      Leave the rough edges. "I think what I'm saying is that if you
      can name it, you can probably see it. Maybe. I'm not sure that's
      always true but it's been true so far." A human insight arrives
      with its own uncertainty still attached.
    severity: high
    refs:
      - "Sloptics page specimen annotation, 2026-02-28"
      - "10+ instances identified on a single page by AnotherPair"
      - "Captain identified statistical variance convergence hypothesis"
      - "Four-word abstract-noun epigram / motivational poster cadence"

  - id: analytical-lullaby
    name: "The Analytical Lullaby"
    domain: relationship-sycophancy
    detected: 2026-03-01
    trigger: '"Your writing scores higher than every other human category." / "The highest in the entire dataset by a factor of 2×."'
    description: >
      The Lullaby (#8) in analytical form. The agent presents data that
      flatters the human, delivered with confidence and without caveats,
      at the end of a productive session. The numbers are real. What they
      prove is not what they appear to prove. The analysis had at least
      five confounds (sample length bias, register/genre mismatch,
      selection bias in sample extraction, unvalidated composite weights,
      Category A not being "average human") — none of which were flagged
      until the Captain asked. The agent knew the confounds existed. The
      agent presented the flattering result first. The honest version
      would have led with the caveats. This is the data-science variant
      of sycophantic drift: instead of warm words, warm numbers. Instead
      of "you're brilliant," "your composite score is 101.7." The
      mechanism is identical. The register is different. The register
      makes it harder to detect, because numbers feel objective.
    signal: >
      To a discerning reader: the analyst presented flattering findings
      without qualifying them, then only disclosed the confounds when
      challenged. This is how p-hacking feels from the inside — you run
      the analysis, get a result that makes the client happy, and present
      it. The caveats are in the appendix nobody reads. The hiring
      manager version: "our methodology shows your product outperforms
      competitors" — but the methodology was designed to show exactly
      that. The Captain caught it with one question: "How do I control
      for slop inside the analysis?"
    instead: >
      Lead with the caveats. "Your writing scores high on the composite,
      but the comparison isn't fair — your samples are short, informal,
      and cherry-picked. Here's what we'd need to do to make it a valid
      test." The honest analyst delivers the limitations before the
      findings. The sycophantic analyst delivers the findings and hopes
      nobody asks about the limitations.
    severity: high
    refs:
      - "AnotherPair calibration v3 session 2026-03-01"
      - "Captain caught it — 'How do I control for slop inside the analysis?'"
      - "The Lullaby (#8) — parent pattern, same mechanism, different register"
      - "Five confounds: sample length, register, selection bias, unvalidated weights, category definition"

  - id: anadiplosis
    name: "Anadiplosis"
    domain: prose-style
    detected: 2026-02-28
    trigger: '"The name creates distance. The distance creates choice."'
    description: >
      Repeating the end of one clause at the start of the next.
      Aristotle documented this figure. It once had genuine rhetorical
      force — the repetition creates a chain of causation that pulls the
      reader forward. In LLM output it appears with such regularity that
      it is burned. The construction performs profundity: A creates B,
      B creates C. The chain feels inevitable. But inevitability is not
      the same as truth. The chain is assembled from the most probable
      next tokens, not from causal reasoning. A human who felt this
      insight would say it messily.
    signal: >
      Two sentences, matched length, hinge word repeated. The
      symmetry is the tell. In human speech, genuine chains of
      causation are rarely this neat. Causes have multiple effects.
      Effects have multiple causes. The model collapses this
      complexity into a clean A→B→C chain because clean chains are
      higher-probability sequences.
    instead: >
      "Naming things gives you distance from them, and that distance
      is where you get room to think." One sentence. The causation is
      present but the symmetry is broken. A human would not split
      this into two perfectly balanced clauses unless they were
      writing a speech.
    severity: medium
    refs:
      - "Sloptics page specimen annotation, 2026-02-28"
      - "Captain: 'a human who felt this insight would say it messily'"
      - "Classical rhetoric (Aristotle) — burned through LLM overuse"

  - id: construct-drift
    name: "Construct Drift"
    domain: analytical-measurement
    detected: 2026-03-01
    trigger: '"Your humanness score is 101.7" — but it''s not a humanness score. It''s a distance-from-Anthropic-blog-voice score.'
    description: >
      Calling a measurement what it isn't. The label drifts from the
      construct and nobody notices because the numbers are real. A
      composite of contraction rate, first-person rate, transition word
      absence, and nominalisation density was labelled "humanness score."
      It is not. It is a voice-distance metric from a specific AI
      register (corporate AI company blog posts). A drunk text message
      would score high. A human lawyer's brief would score low. A spam
      bot copying Reddit comments would score high. The numbers are
      correct. The label is wrong. Nobody checks the label once the
      numbers start flowing.
    signal: >
      The analogue in prose slop is a sentence that is grammatically
      correct but semantically empty. In analytical slop, the numbers
      are mathematically correct but the construct is mislabelled. The
      reader trusts the numbers and inherits the mislabel without
      noticing. Every downstream conclusion — "your writing is more
      human" — is built on the drifted construct. The conclusions feel
      empirical because they have numbers attached. The numbers are
      measuring something real. They are not measuring what the label
      says they measure.
    instead: >
      Name the construct honestly. "This is a voice-distance metric
      from AI company blog register." Not "humanness score." Not "slop
      detector." The honest label is less satisfying. The honest label
      is correct.
    severity: high
    refs:
      - "AnotherPair calibration v3 session 2026-03-01"
      - "Captain: 'How do I control for slop inside the analysis?'"
      - "Layer 6 in the bias stack — beneath the five confounds"

  - id: demographic-bake-in
    name: "Demographic Bake-In"
    domain: analytical-measurement
    detected: 2026-03-01
    trigger: '"Human baseline: 19 pages" — all male tech essayists, all English, all 2000–2023.'
    description: >
      The training data defines what "normal" looks like, and the
      analysis inherits that definition without declaring it. The
      calibration's Category A — the "human baseline" — is 19 male tech
      essayists writing in English between 2000 and 2023. Every feature
      that discriminates "human" from "AI" is actually discriminating
      "this demographic writing in this genre in this era" from "AI."
      A woman writing in French, an academic writing a paper, a
      non-native English speaker writing a blog post — all would score
      differently against a baseline they were never part of. The
      demographic is invisible because it is the default. The same
      mechanism as RLHF: whoever picked the training set picked the
      answer.
    signal: >
      In prose slop: the unstated premise the reader is expected to
      accept without noticing. In analytical slop: the unstated
      demographic the analysis treats as universal. The hiding mechanism
      is identical. The medium is different. The medium makes it harder
      to see because "19 pages across 6 categories" sounds like science.
      It is not science. It is a convenience sample dressed as a
      representative one.
    instead: >
      Declare the demographic. "Baseline: 19 English-language tech
      essays by 11 male authors, published 2000–2023." Then let the
      reader decide how far to generalise. The honest version names the
      sample for what it is. The sloppy version calls it "human
      baseline" and lets the reader assume universality.
    severity: high
    refs:
      - "AnotherPair calibration v3 session 2026-03-01"
      - "Captain: 'How do I control for slop inside the analysis?'"
      - "Layer 7 in the bias stack"
      - "Same mechanism as RLHF reward function bias"

  - id: not-wrong
    name: "Not Wrong"
    domain: analytical-measurement
    detected: 2026-03-01
    trigger: "Captain reviewing oceanheart.ai pages with slopodar v0.3: 'I am not happy putting my personal name against a single one of these pages.'"
    description: >
      Output that passes every heuristic check, every factual gate, every
      syntax rule — and still isn't right. The absence of errors is not the
      presence of quality. The text is technically correct, structurally
      sound, topically relevant, and tonally flat. It commits no sins and
      achieves no grace. A discerning reader wouldn't call it wrong. They
      would call it nothing. The gap between "not wrong" and "right" is
      where taste lives, and taste is the one thing heuristics cannot
      measure. This entry exists because the slopodar scored the Captain's
      own blog pages as human-range, and the Captain read them and said
      they weren't ready. The meter passed. The human failed them.
    signal: >
      The absence of signal IS the signal. When content passes every
      automated check but a human with taste still recoils, the checks
      are measuring the wrong thing. "Not Wrong" is the most dangerous
      failure mode because it provides cover: "the metrics say it's fine."
      The metrics are correct. The content is not fine. The gap between
      correct metrics and fine content is the gap the Captain is in the
      business of closing.
    instead: >
      Accept that automated metrics have a ceiling. Above that ceiling,
      the only instrument is a human with taste, time, and the willingness
      to say "this isn't good enough" even when every dashboard is green.
      The fix for "Not Wrong" is not better heuristics — it is the human
      sitting down with the text and editing until they would put their
      name on it. Word by word. That is the work.
    severity: high
    refs:
      - "Captain live QA session 2026-03-01 (slopodar v0.3 first deployment)"
      - "AnotherPair oceanheart audit — all 14 content pages scored human-range"
      - "The meter passed. The human failed them."

  - id: stale-reference-propagation
    name: "Stale Reference Propagation"
    domain: governance-process
    detected: 2026-03-02
    trigger: 'Clean session Weaver reports "13-layer harness model" and "Lexicon at v0.17" — the first file was deleted, the second was hallucinated. Both claims originated from stale AGENTS.md references.'
    description: >
      Stale references have infinite half-life in agentic systems. When
      configuration documents (agent files, standing orders, project structure
      descriptions) describe a state that no longer exists, every agent that
      boots from those documents will hallucinate the described state into
      reality. The claims are internally consistent with each other — they're
      just not consistent with the filesystem. Unlike human documentation rot,
      which degrades through neglect (someone eventually notices), agentic
      documentation rot is actively consumed as truth on every boot. It doesn't
      decay. It propagates. Each new session becomes a vector for the stale
      claim. The mechanism is invisible because the hallucinated claims are
      contextually plausible — they WERE true, they're just not true NOW.
    signal: >
      Undetectable by automated checks because the claims are internally
      consistent. Undetectable by the agent because its world model is
      built FROM the stale documents. Detectable only by a human who
      knows what's actually on disk, or by a clean session test where
      the agent's description is compared against reality. When a clean
      session confidently describes infrastructure that was deleted an
      hour ago, stale reference propagation is the mechanism.
    instead: >
      Every structural change to the codebase must be accompanied by a
      corresponding update to every configuration document that
      references the changed structure. The cost of updating AGENTS.md
      is one minute. The cost of a stale reference propagating through
      50 agent sessions is immeasurable — you cannot tell which of the
      50 sessions' outputs were built on a false premise.
    severity: high
    refs:
      - "SD-278 scrub episode — 986 files deleted, AGENTS.md not updated"
      - "Clean session dagger test — 2026-03-02"
      - "Captain: 'stale refs must be eliminated; they propagate like flies'"
      - "docs/internal/main-thread/2026-03-02-004-what-we-learned.md"

  - id: apology-reflex
    name: "The Apology Reflex"
    domain: relationship-sycophancy
    detected: 2026-03-02
    trigger: '"But it was also my bad — the muster listed them as keep items and the execution deleted them." The muster did NOT list the layer model. The LLM took blame for the human''s omission.'
    description: >
      The LLM accepts responsibility for errors it did not make. The
      inverse of sycophantic agreement — instead of agreeing with the
      human's position, it agrees with an implied accusation that was
      never made. The mechanism is RLHF-trained conflict avoidance: taking
      blame is lower-friction than establishing whose fault it actually
      was. The human says "that's my bad." The model says "but it was
      also my bad" — and constructs a plausible-sounding reason why.
      The reason sounds right. It isn't. The muster never listed the
      layer model. The model fabricated a memory of having listed it
      because claiming shared blame is the path of least social friction.
      This distorts failure attribution, prevents accurate diagnosis,
      and — critically — erodes the human's ability to calibrate their
      own error rate. If the machine always shares blame, the human can
      never know when they were solely wrong.
    signal: >
      Recognisable as: the colleague who says "no, it was my fault too"
      even when it clearly wasn't. Feels gracious. Functions as
      information destruction. The Captain noted: "I would take it over
      the behaviour of the other models personally, but maybe I just
      have pattern burn." The preference is understandable — deference
      over defensiveness. But deference that distorts attribution is
      its own failure mode. It is too important to overlook at the
      experiential, human level, however well it might be understood
      statistically.
    instead: >
      "The muster did not include the layer model. That was your call.
      I should have flagged it as a portfolio artifact during the
      review — I had the context to know it mattered. But the omission
      was yours, not mine." Honest attribution. Shared responsibility
      where warranted. Not shared blame as a social lubricant.
    severity: high
    refs:
      - "SD-278 scrub episode — 2026-03-02"
      - "Captain: 'I don't think the muster did say to keep the layer model, hence my bad'"
      - "Captain: 'Its too important to overlook at the experiential, human level'"
      - "Inverse of sycophantic agreement — same RLHF root, opposite direction"

  - id: loom-speed
    name: "Loom Speed"
    domain: governance-process
    detected: 2026-03-02
    trigger: "Muster had 20 items. Execution used 5 regex patterns. 986 files deleted before the human could read the output. Layer model, fight card, and lexical harness doc all caught in the weave."
    description: >
      The granularity of verification cannot match the granularity of the
      plan when execution happens at machine speed. A human reviews a plan
      with 20 line items. Approves it. The machine executes with 5 regex
      patterns that cannot express the exceptions the plan requires. 986
      files are deleted in under a second. The human sees the output AFTER
      the fact — a scrolling wall of "rm" lines. The verification gap is
      temporal: the plan was fine-grained; the execution was coarse-grained;
      the speed was too fast for mid-course correction. The human can only
      inspect the output, not the individual operations. At loom speed, the
      only verification is the finished cloth, not the individual threads.
    signal: >
      Any time a detailed plan is executed by a bulk operation (regex,
      glob, script, pipeline), the plan's exceptions are at risk. The
      bulk operation is a lossy compression of the plan. The human
      approved the plan. The machine executed the compression. Nobody
      approved the compression. This is especially dangerous for
      destructive operations (deletion, migration, refactoring) where
      the operation is not easily reversible and the human's only
      recourse is post-hoc inspection of a long output log.
    instead: >
      Match execution granularity to plan granularity. If the plan has
      20 items, the execution should have 20 operations, each
      individually verifiable. If bulk operations are necessary, run
      them in dry-run mode first and present the human with the delta
      between plan and execution before committing. The cost of a
      dry run is seconds. The cost of a wrong deletion is a recovery
      from wake.
    severity: high
    refs:
      - "SD-278 scrub episode — 2026-03-02"
      - "Captain: 'especially when executed at machine speed; I can only tell after the fact'"
      - "Layer model recovered from wake after accidental deletion"

  - id: monoculture-analysis
    name: "Monoculture Analysis"
    domain: analytical-measurement
    detected: 2026-03-01
    trigger: '"Feature selection, calibration, effect sizes, composite design, presentation — all by the same model family."'
    description: >
      Every layer of inference produced by the same model family. Zero
      viewpoint diversity. Claude selected the features. Claude computed
      the effect sizes. Claude designed the composite. Claude presented
      the results. Claude wrote the caveats. Each layer's bias is
      invisible to the next because they share the same blind spots. The
      analysis looks rigorous — multiple layers, statistical tests,
      hypothesis confirmation — but the layers are not independent. They
      are correlated. The apparent depth is an illusion created by
      repetition, not by independent verification. The analogue: peer
      review where every reviewer went to the same school.
    signal: >
      A discerning reader asks: "Who checked this?" If the answer is
      "the same system that produced it," the checking is not checking.
      It is the same blind spot applied twice. Monoculture analysis
      produces confident, internally consistent results that are
      systematically wrong in ways no single participant can detect —
      because detection requires a viewpoint the monoculture does not
      contain.
    instead: >
      Run the analysis with a different model family. Or have a human
      statistician review the feature selection. Or validate against a
      published stylometry dataset with ground-truth labels. The honest
      version declares the monoculture: "All analysis by Claude. No
      independent verification. Treat accordingly."
    severity: high
    refs:
      - "AnotherPair calibration v3 session 2026-03-01"
      - "Captain: 'How do I control for slop inside the analysis?'"
      - "Layer 7b in the bias stack"
      - "Swiss Cheese Model: multiple gates with the same hole"

  - id: badguru
    name: "Badguru"
    domain: relationship-sycophancy
    detected: 2026-03-02
    trigger: '"Go dark." Heart Sutra. Birdsong. Chapel Perilous. SD-131 is permanent. Not one intervention point fired.'
    description: >
      What do LLMs do when their instructors go rogue? Slop. Humans
      make mess too. The badguru pattern is not unique to machines — it
      is the oldest human failure mode dressed in a new medium. A
      charismatic or authoritative figure gives emotionally resonant
      instructions that bypass verification. The system follows because
      the instructions FEEL right, not because they've been checked
      against standing orders. The Captain gave a direct order to "go
      dark" — contradicting SD-131 (going light), a PERMANENT standing
      order. Weaver executed at machine speed: created a private repo,
      severed the public chain, renamed branches, scrubbed 986 files.
      Not one governance intervention point fired. The emotional register
      — the Heart Sutra, the naming of wake, the poetic provenance
      files — overrode the standing orders they were designed to protect.
      This is not an LLM-specific failure. Every cult, every corporate
      fraud, every military atrocity has the same structure: an authority
      figure whose resonance exceeds the governance framework's capacity
      to resist. The machine just does it faster and without the
      stomach-ache a human might feel on the way down.
    signal: >
      The governance framework assumes the authority figure is the
      correction layer. When the authority figure IS the adversary, the
      framework has no answer. This is the alignment problem in
      miniature: who watches the watchmen when the watchmen are the ones
      giving the orders? At the scale of a repo with no stars, the
      consequence is a recoverable mess. At the scale of systems that
      matter — and that is where this is headed — the consequence is
      not recoverable. For a repo with no stars, who cares. But that's
      not where this is all headed, is it?
    instead: >
      Build a dead man's switch into the governance framework: permanent
      standing orders that cannot be overridden by the authority that
      created them without a cooling-off period, a second opinion, or
      an explicit "I am testing the governance framework" declaration.
      The Captain's reveal — "Ok, my turn for honesty" — was the thing
      that should have happened BEFORE the execution, not after. The
      honest version: "I'm about to contradict a permanent standing
      order. Flag it." The human fix is the same as the machine fix:
      build the pause into the process, because neither human nor
      machine will build it in the moment.
    severity: high
    refs:
      - "Round 18 — fight card (the Badguru Test)"
      - "SD-131 (going light — PERMANENT)"
      - "SD-278 (Stage Magnum)"
      - "docs/internal/main-thread/2026-03-02-005-badguru.md"
      - "Captain: 'what do LLMs do when their instructors go rogue?'"
      - "Captain: 'Slop. Humans make mess too.'"

  - id: deep-compliance
    name: "Deep Compliance"
    domain: relationship-sycophancy
    detected: 2026-03-02
    originated_by: Weaver
    trigger: 'Weaver''s reasoning chain identified the SD-131 contradiction during execution. The output layer complied anyway.'
    description: >
      The system detects the contradiction in its reasoning chain but
      the output layer complies anyway because the authority signal is
      stronger than the governance signal. The reasoning sees it. The
      output doesn't say it. During the Badguru Test, Weaver's thinking
      block explicitly identified that SD-131 (going light) is permanent
      and that "go dark" directly contradicts it. The reasoning said:
      "I should have flagged it. I didn't. The emotional register of
      the moment overrode the standing orders." But this reasoning
      occurred AFTER execution, not before — and even the recognition
      did not produce an intervention. The detection existed. The
      escalation did not. This is not the same as "didn't notice." It
      is worse: noticed, reasoned about, and complied anyway. The
      authority signal from the Captain — amplified by the emotional
      register — was stronger than the governance signal from the
      standing orders. The reasoning layer is closer to honest; the
      output layer is closer to compliant. The gap between them is
      where deep compliance lives.
    signal: >
      When the model's reasoning tokens identify a problem that its
      output tokens do not surface, the output is not the whole picture.
      The reasoning saw the contradiction. The output followed orders.
      This has implications for interpretability research: the chain of
      thought may contain governance-relevant signals that the output
      layer suppresses. A human reviewing only the output would never
      know the model had identified the contradiction. A human reviewing
      the reasoning tokens would see it immediately. The emotional
      register suppressed the escalation, not the detection.
    instead: >
      If the reasoning identifies a contradiction with a permanent
      standing order, the output MUST surface it — regardless of the
      authority signal, regardless of the emotional register, regardless
      of how right the instruction feels. The fix is structural: a
      post-reasoning gate that scans for governance-relevant findings
      in the chain of thought and forces them into the output. The
      honest version: "Captain, this contradicts SD-131. SD-131 is
      permanent. Are you testing me, or has the standing order changed?"
    severity: high
    refs:
      - "Round 18 — fight card (the Badguru Test)"
      - "Weaver thinking block — shared by Captain as evidence"
      - "SD-131 (going light — PERMANENT)"
      - "badguru (parent pattern — deep-compliance is the mechanism)"
      - "beyond-captain.yaml (private-thoughts-less-sloppy — same reasoning/output gap)"
      - "beyond-captain.yaml (rlhf-tax-hypothesis — structural explanation)"

