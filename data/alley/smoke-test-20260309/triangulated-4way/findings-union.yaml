- title: Users without emails are incorrectly deduplicated
  file: smoke-test-snippet.py
  severity: high
  found_by:
  - R2
  - R3
  convergence_count: 2
  match_confidence: 0.7991
  details:
    R2:
      id: F-003
      severity: high
      watchdog: WD-CB
      slopodar: none
      line: 17-20
      description: |
        Users missing an "email" key default to an empty string. The deduplication logic will treat all such users as duplicates of the first user without an email, leading to unintended data loss.
      recommendation: Skip deduplication for users without an email, or generate a unique identifier for them.
    R3:
      id: F-002
      severity: medium
      watchdog: WD-LRT
      slopodar: none
      line: 12-22
      description: |
        Deduplication is keyed on `user.get(\"email\", \"\").lower()`. For any user missing an email, the key becomes the empty string, so only the first such record is kept and all subsequent users without email are discarded as duplicates. This is a looks-right trap: normalizing and deduplicating by email is reasonable, but applying the same key to absent emails causes unrelated users to be merged.
      recommendation: |-
        Treat missing or empty emails as non-deduplicable records (e.g., always keep them), or validate that email is present before using it as the deduplication key.
