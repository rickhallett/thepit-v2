findings:
- id: F-001
  branch: phase4-economy-v2
  file: lib/bouts/streaming.ts
  line: 109-148
  severity: critical
  watchdog: WD-PL
  slopodar: phantom-ledger
  title: Bout UPDATE to 'completed' and credit settlement not atomic
  description: |
    In createBoutSSEStreamWithPersistence, db.update(bouts) to 'completed' and settleCredits are separate. If settlement fails after UPDATE, bout is marked completed without credit adjustment, creating phantom audit.
  recommendation: Wrap UPDATE and settleCredits in db.transaction
- id: F-002
  branch: phase4-economy-v2
  file: lib/stripe/webhook.ts
  line: 88-119
  severity: high
  watchdog: WD-PL
  slopodar: phantom-ledger
  title: User tier UPDATE and grant application not atomic in subscription created
  description: |
    db.update(users) sets tier, then applyCreditDelta grants credits. If grant fails, user has tier without credits. Similar in updated handler (lines 126-169).
  recommendation: Wrap in db.transaction(async (tx) => { update; grant })
- id: F-003
  branch: phase4-economy-v2
  file: lib/credits/balance.ts
  line: 65-96
  severity: critical
  watchdog: WD-PL
  slopodar: phantom-ledger
  title: applyCreditDelta logs transaction even if no credit row exists
  description: |
    If UPDATE affects 0 rows (no account), result=[], newBalance=0, but then INSERTs transaction as if delta applied. Audit trail claims change without actual balance update.
  recommendation: Check result.length > 0 before INSERT; or ensure account exists first
- id: F-004
  branch: phase4-economy-v2
  file: lib/credits/intro-pool.ts
  line: 85-149
  severity: medium
  watchdog: none
  slopodar: none
  title: Floating-point decay recompute in JS may mismatch SQL due to timing
  description: |
    Atomic UPDATE uses SQL power(0.5, ...), then JS recomputes actualClaim with Math.pow. Millisecond delays or FP precision could cause discrepancies in claimed amount.
  recommendation: Return actual claimed from UPDATE RETURNING clause instead of recompute
- id: F-005
  branch: phase4-economy-v2
  file: lib/stripe/webhook.ts
  line: n/a
  severity: high
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: Idempotency checked for grants but not for all DB updates
  description: |
    hasProcessedReference protects grants, but user UPDATEs (e.g., tier changes) occur without checks. Duplicate events could overwrite tiers without grant reapplication.
  recommendation: Wrap all handler ops in transaction with reference_id check
