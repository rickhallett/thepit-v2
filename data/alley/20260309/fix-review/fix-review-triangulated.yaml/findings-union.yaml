- title: Convergence rate logic double-counts for N=2 and misses lengths for N>3
  file: bin/triangulate
  severity: high
  found_by:
  - R2
  convergence_count: 1
  match_confidence: null
  details:
    R2:
      id: F-001
      severity: high
      watchdog: WD-LRT
      slopodar: shadow-validation
      line: 344-347
      description: |
        In `compute_metrics`, `converged_2plus` is calculated as `converged_all + converged_2`. If the user provides exactly 2 review files, `converged_all` and `converged_2` count the exact same groups, resulting in `converged_2plus` double-counting the findings. If the user provides 4 or more files, groups with intermediate sizes (e.g., 3 out of 4) are omitted entirely from the calculation.
      recommendation: |-
        Compute `converged_2plus` directly by checking `sum(1 for g in groups if len(g['convergence']) >= 2)`.
