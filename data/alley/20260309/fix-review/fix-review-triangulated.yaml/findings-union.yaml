- title: Match confidence calculates spanning tree average instead of true pairwise average
  file: bin/triangulate
  severity: high
  found_by:
  - R2
  - R3
  - R1
  convergence_count: 3
  match_confidence: 0.7199
  details:
    R2:
      id: F-002
      severity: high
      watchdog: WD-SH
      slopodar: phantom-ledger
      line: 363-366
      description: |
        The docstring claims `match_confidence` represents the "average pairwise similarity score within group". However, when a new finding joins a group, only the single similarity score that triggered the merge is appended to `group["_scores"]`. For a group of N findings, this array tracks exactly N-1 edges, silently discarding all cross-edge similarities between existing members and the new arrival.
      recommendation: |-
        Remove `group['_scores']` during matching. Calculate `match_confidence` after all groups are formed by calculating the average similarity of all N*(N-1)/2 pairs in each group.
    R3:
      id: F-002
      severity: medium
      watchdog: WD-SH
      slopodar: phantom-ledger
      line: 349-368
      description: |
        The code claims match_confidence is the average of pairwise scores within the group, but it only averages the subset of scores that happened to create/extend the group. For groups of size 3, the missing pairwise similarity is never computed, and when a member is added via _avg_similarity_to_group the stored score is the original pair score, not the average used for admission. This yields misleading confidence values.
      recommendation: |-
        Compute all pairwise similarities among group members and average them, or rename the field to reflect the partial/greedy score source.
    R1:
      id: F-005
      severity: medium
      watchdog: WD-PL
      slopodar: phantom-ledger
      line: 349-368
      description: |
        match_confidence is described as the average pairwise similarity within a group, but the implementation only stores the score that triggered each admission. For a 3-member group, you get 2 scores (a spanning tree) instead of the 3 pairwise similarities. The reported confidence is not what it claims to be.
      recommendation: |-
        After grouping is complete, compute all N*(N-1)/2 pairwise similarities for each group and average those for match_confidence.
- title: Docstring claims max-weight bipartite but implementation is greedy best-first
  file: bin/triangulate
  severity: high
  found_by:
  - R1
  - R3
  convergence_count: 2
  match_confidence: 0.7029
  details:
    R1:
      id: F-001
      severity: high
      watchdog: WD-SH
      slopodar: shadow-validation
      line: 260-300
      description: |
        The matcher docstring says "max-weight bipartite matching" but the actual algorithm is greedy best-first assignment. It sorts all pairwise scores descending and greedily assigns findings to groups, skipping when both findings are already in different groups. This is not bipartite matching — it cannot reassign to find a global optimum. The docstring is a semantic hallucination that will mislead anyone auditing the instrument.
      recommendation: |-
        Either implement true max-weight bipartite matching (e.g., Hungarian algorithm via scipy) or correct the docstring to say greedy best-first assignment.
    R3:
      id: F-001
      severity: high
      watchdog: WD-SH
      slopodar: shadow-validation
      line: 260-366
      description: |
        The matcher docstring advertises max-weight bipartite-style matching and that group admission compares against all members. In practice it is greedy best-first and explicitly skips merging when both findings are already assigned to different groups. This can split what should be a single converged group (e.g., A~B and B~C over threshold) into two groups, undercounting convergence under realistic multi-match inputs.
      recommendation: |-
        Either implement proper group merging when transitive matches exist or update the docstring and metrics to reflect the greedy no-merge behavior.
- title: Permutation explosion with >3 reviews has no guard
  file: bin/triangulate
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  match_confidence: null
  details:
    R1:
      id: F-003
      severity: medium
      watchdog: WD-PG
      slopodar: none
      line: 400-420
      description: |
        The marginal value calculation computes all N! permutations of review orderings. For 3 reviews this is 6 permutations. For 7 reviews this is 5040. For 10 reviews this is 3.6M. There is no guard, warning, or fallback to sampling when N exceeds a reasonable threshold.
      recommendation: |-
        Add a guard that switches to random sampling (e.g., 1000 samples) when N! exceeds a threshold, or cap N at 7 with a warning.
