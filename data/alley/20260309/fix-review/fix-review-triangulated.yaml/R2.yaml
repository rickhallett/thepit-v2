findings:
- id: F-001
  branch: pipeline-fix
  file: bin/triangulate
  line: 344-347
  severity: high
  watchdog: WD-LRT
  slopodar: shadow-validation
  title: Convergence rate logic double-counts for N=2 and misses lengths for N>3
  description: |
    In `compute_metrics`, `converged_2plus` is calculated as `converged_all + converged_2`. If the user provides exactly 2 review files, `converged_all` and `converged_2` count the exact same groups, resulting in `converged_2plus` double-counting the findings. If the user provides 4 or more files, groups with intermediate sizes (e.g., 3 out of 4) are omitted entirely from the calculation.
  recommendation: |-
    Compute `converged_2plus` directly by checking `sum(1 for g in groups if len(g['convergence']) >= 2)`.
- id: F-002
  branch: pipeline-fix
  file: bin/triangulate
  line: 363-366
  severity: high
  watchdog: WD-SH
  slopodar: phantom-ledger
  title: Match confidence calculates spanning tree average instead of true pairwise average
  description: |
    The docstring claims `match_confidence` represents the "average pairwise similarity score within group". However, when a new finding joins a group, only the single similarity score that triggered the merge is appended to `group["_scores"]`. For a group of N findings, this array tracks exactly N-1 edges, silently discarding all cross-edge similarities between existing members and the new arrival.
  recommendation: |-
    Remove `group['_scores']` during matching. Calculate `match_confidence` after all groups are formed by calculating the average similarity of all N*(N-1)/2 pairs in each group.
- id: F-003
  branch: pipeline-fix
  file: bin/triangulate
  line: '886'
  severity: medium
  watchdog: WD-CB
  slopodar: shadow-validation
  title: Command 'metrics' ignores the new MultilineDumper
  description: |
    The `cmd_metrics` function outputs YAML directly to `sys.stdout` using the standard `yaml.dump`. This bypasses the new `MultilineDumper` introduced in `write_yaml`, meaning the CLI output will not receive the promised readable multi-line strings block style formatting.
  recommendation: |-
    Extract the `MultilineDumper` class into a shared top-level helper, and pass `Dumper=MultilineDumper` to the `yaml.dump` call in `cmd_metrics`.
- id: F-004
  branch: pipeline-fix
  file: bin/triangulate
  line: 351-352
  severity: low
  watchdog: WD-SH
  slopodar: paper-guardrail
  title: Canonical group finding relies on match order, not review ID order
  description: |
    A comment states: `# Canonical = first finding in the group (by review ID order)`. However, `group["convergence"]` is populated in the order edges are processed from the sorted `scores` list. The first element is simply the seed finding with the strongest match, not necessarily the earliest review ID.
  recommendation: |-
    If deterministic review ID order is required, sort the keys or explicitly iterate over `review_ids`. Otherwise, correct the comment to state it uses match order.
- id: F-005
  branch: pipeline-fix
  file: bin/triangulate
  line: 373-376
  severity: low
  watchdog: WD-DC
  slopodar: none
  title: Unused all_findings parameter in _avg_similarity_to_group
  description: |
    The helper function `_avg_similarity_to_group` defines an `all_findings` parameter which is never referenced in the function body.
  recommendation: Remove the unused `all_findings` parameter from the signature and its call sites.
- id: F-006
  branch: pipeline-fix
  file: bin/triangulate
  line: 763-768
  severity: low
  watchdog: WD-CB
  slopodar: none
  title: CLI parser treats trailing flags without values as positional file paths
  description: |
    In `parse_cli_args`, if a flag (e.g. `--out`) is provided at the very end of the command without a value, the `i + 1 < len(args)` condition fails. The parser falls through to the `else` block and appends the flag string to the `files` array, resulting in a confusing 'File not found' error later.
  recommendation: |-
    Add an `elif args[i].startswith('--'):` branch to explicitly raise a CLI parsing error for dangling flags.
