findings:
- id: F-001
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: critical
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: Claims rely on unverified matching accuracy
  description: 'The matching algorithm is greedy and uncalibrated, but all downstream metrics depend on its correctness. Without
    measured false-merge and missed-merge rates, convergence and uniqueness metrics are unreliable.

    '
  recommendation: Calibrate matching on a human-labeled gold set and report match error rates.
- id: F-002
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: critical
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: False positive rate claimed without adjudication
  description: 'The FP rate defaults all findings to confirmed true. This makes the precision chart and any quality claims
    invalid until independent human verification is completed.

    '
  recommendation: Require human adjudication of every finding before reporting FP/precision.
- id: F-003
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: WD-LRT
  slopodar: shadow-validation
  title: Convergence treated as independent verification
  description: 'Convergence can reflect shared training priors rather than independent discovery. The current process lacks
    controls to distinguish these causes.

    '
  recommendation: 'Add baselines: same-model multi-run and prompt-variance controls.'
- id: F-004
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: WD-CB
  slopodar: none
  title: Single-model rate lacks baseline
  description: 'The 74% single-model rate is presented as evidence of model complementarity without comparison to repeated
    runs of the same model or larger token budgets.

    '
  recommendation: Run within-model variance baselines and report comparative rates.
- id: F-005
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: critical
  watchdog: WD-PG
  slopodar: stale-reference-propagation
  title: General claims from N=1 codebase
  description: 'Claims about model blind spots and diminishing returns are drawn from a single codebase with 31 findings.
    This cannot support generalisation.

    '
  recommendation: Evaluate across multiple diverse codebases and report confidence intervals.
- id: F-006
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: WD-PL
  slopodar: phantom-ledger
  title: Cost-benefit claims without cost model
  description: 'The methodology promises cost justification but does not model costs or severity-weighted benefits. This is
    benefit-only accounting.

    '
  recommendation: Include explicit cost model and compare to cheaper baselines.
- id: F-007
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: WD-PG
  slopodar: shadow-validation
  title: Human delta is order-confounded
  description: 'Human review occurs after model outputs, priming the reviewer and inflating the apparent human delta. This
    measures residuals after models, not human capability.

    '
  recommendation: Add blind human-first baseline with counterbalanced order.
