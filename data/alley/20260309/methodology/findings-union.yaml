  convergence_count: 2
  details:
    R2:
      id: F-002
      severity: high
      watchdog: WD-LRT
      slopodar: shadow-validation
      description: 'The headline claim relies on the 74% single-model-only finding rate to prove that multi-model review is
        necessary. However, without running the exact same model 3 times to measure its own internal variance, it''s impossible
