  - R3
  convergence_count: 2
  details:
    R1:
      id: F-006
      severity: high
      watchdog: none
      slopodar: none
      description: 'DP-4 claims a cost-benefit analysis but includes no cost measurements — no API token costs, no human dispatch
        time, no wall-clock latency, no opportunity cost comparison. Without costs, this is a benefit-only analysis. The most
        important missing comparison is same-model-3x vs cross-model-3x at equivalent token budget.

        '
    R3:
      id: F-006
      severity: high
      watchdog: WD-PL
      slopodar: phantom-ledger
      description: 'The methodology promises cost justification but does not model costs or severity-weighted benefits. This
        is benefit-only accounting.

        '
- title: Convergence may measure training data overlap, not independent verification
  file: docs/internal/weaver/darkcat-alley.md
  severity: high
  found_by:
  - R1
  - R3
  convergence_count: 2
  details:
    R1:
      id: F-007
      severity: medium
      watchdog: WD-TDF
      slopodar: none
      description: 'The single 3-way convergent finding (applyCreditDelta non-transactional) maps to a well-known pattern
        (database atomicity) present in training corpora for all three models. Convergence on template-derivable findings
        is expected and does not demonstrate independent analytical capability. The signal value of convergence varies by
        finding type but this distinction is not made.

        '
    R3:
      id: F-003
      severity: high
      watchdog: WD-LRT
      slopodar: shadow-validation
      description: 'Convergence can reflect shared training priors rather than independent discovery. The current process
        lacks controls to distinguish these causes.

        '
- title: Finding count asymmetry confounds uniqueness rate
  file: docs/internal/weaver/darkcat-alley.md
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-008
      severity: medium
      watchdog: none
      slopodar: none
      description: 'Claude produced 18 findings, Gemini 6, Codex 11. A more verbose model mechanically produces more unmatched
        findings regardless of quality. The uniqueness rate is partially an artefact of count asymmetry. Normalisation (unique
        findings as fraction of that model''s total) or rate-based metrics would partially address this.

        '
- title: Taxonomy priming may bias category distribution across models
  file: docs/internal/weaver/darkcat-alley.md
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-009
      severity: medium
      watchdog: none
      slopodar: none
      description: 'All reviewers receive the Watchdog taxonomy and Slopodar patterns. Different models may respond differently
        to categorical priming — one model may anchor more heavily on provided category names than another. The observed category
        distribution may partially reflect differential priming response rather than differential detection capability.

        '
- title: Author-reviewer model family correlation uncontrolled
  file: docs/internal/weaver/darkcat-alley.md
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-010
      severity: medium
      watchdog: none
      slopodar: none
      description: 'Code is authored by Claude polecats and reviewed by Claude Opus among others. A model reviewing its own
        family''s output may have correlated blind spots (monoculture risk) or privileged insight into its own failure modes.
        The direction of this bias is unknown and uncontrolled. Claude''s higher finding count (18 vs 6/11) could reflect
        either effect.

        '
- title: Severity calibration metric uses ordinal distance instead of weighted kappa
  file: docs/internal/weaver/darkcat-alley.md
  severity: low
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-011
      severity: low
      watchdog: none
      slopodar: none
      description: 'Metric 6 measures inter-rater severity agreement using ordinal distance between ratings. This treats all
        adjacent-level disagreements as equal (critical-high = medium-low). Cohen''s weighted kappa or Krippendorff''s alpha
        would be more informative and are standard for ordinal inter-rater agreement.

        '
