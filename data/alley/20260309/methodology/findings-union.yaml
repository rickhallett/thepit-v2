- title: 0% FP rate is unmeasured, not measured
  file: docs/internal/weaver/darkcat-alley.md
  severity: critical
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-001
      severity: critical
      watchdog: WD-PG
      slopodar: paper-guardrail
      description: 'The false positive rate defaults all findings to ''confirmed true'' pending human verification. Claiming
        0% FP under these conditions is a paper guardrail by the team''s own taxonomy — a stated metric with no enforcement
        mechanism. This is the single most credibility-damaging claim in the methodology because it is trivially falsifiable
        upon inspection.

        '
- title: Matching algorithm unvalidated — all quantitative claims depend on it
  file: bin/triangulate
  severity: critical
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-002
      severity: critical
      watchdog: WD-PG
      slopodar: shadow-validation
      description: 'The greedy SequenceMatcher-based matching is order-dependent, uses unvalidated weights (0.3/0.7) and threshold
        (0.6), and has no measured false match or missed match rate. Every downstream metric — convergence rate, unique finding
        count, marginal value curve — is a function of this matcher. An unvalidated instrument produces unvalidated measurements.

        '
- title: 'No baseline: same-model-3x comparison missing'
  file: docs/internal/weaver/darkcat-alley.md
  severity: critical
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-003
      severity: critical
      watchdog: none
      slopodar: none
      description: 'The 74% single-model uniqueness rate is the central claim, but without a same-model-3x baseline, it is
        impossible to distinguish cross-model diversity from stochastic review variation. If 3 runs of Claude with different
        seeds produce a similar uniqueness rate, the entire cross-model rationale collapses. This is the single most important
        experiment to run.

        '
- title: N=1 codebase with generalisation language
  file: docs/internal/weaver/darkcat-alley.md
  severity: high
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-004
      severity: high
      watchdog: WD-CB
      slopodar: none
      description: 'All claims are derived from a single codebase, a single code author (Claude polecats), a single review
        prompt, and a single snapshot. The blind spot map, diminishing returns curve, and category distribution are observations
        from one case, not generalisable findings. Confidence intervals on the 74% rate span [55%, 88%] at 95% confidence.
        The ''Semantic Hallucination is Claude-only'' claim rests on 3 instances — insufficient for any statistical test.

        '
- title: Human delta confounded by priming and residual effects
  file: docs/internal/weaver/darkcat-alley.md
  severity: high
  found_by:
  - R1
  - R3
  convergence_count: 2
  details:
    R1:
      id: F-005
      severity: high
      watchdog: none
      slopodar: none
      description: 'DP-3 (Human Delta) measures what humans find AFTER seeing model findings on FIXED code. The human is primed
        by knowledge of model categories and operates on a different defect population (post-fix residuals). The counterfactual
        — what the human would find on raw code without model exposure — is not measured and cannot be recovered from this
        design.

        '
    R3:
      id: F-007
      severity: high
      watchdog: WD-PG
      slopodar: shadow-validation
      description: 'Human review occurs after model outputs, priming the reviewer and inflating the apparent human delta.
        This measures residuals after models, not human capability.

        '
- title: Cost-benefit analysis contains no cost data
  file: docs/internal/weaver/darkcat-alley.md
  severity: high
