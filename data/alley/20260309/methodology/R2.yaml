findings:
- id: F-001
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: critical
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: 0% False Positive rate is mathematically invalid
  description: 'Metric 8 defaults all findings to ''confirmed true'' pending human verification, resulting in a reported 0%
    False Positive rate. This is a literal Paper Guardrail—the metric outputs a comforting number (0% FP) while skipping the
    actual verification mechanism required to generate it. This invalidates DP-1, DP-2, and DP-4.

    '
  recommendation: 'Change Metric 8 to report three states: True Positive, False Positive, and Unadjudicated. Default all findings
    to Unadjudicated until a human explicitly flags them.'
- id: F-002
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: WD-LRT
  slopodar: shadow-validation
  title: 74% single-model rate lacks an intra-model baseline
  description: 'The headline claim relies on the 74% single-model-only finding rate to prove that multi-model review is necessary.
    However, without running the exact same model 3 times to measure its own internal variance, it''s impossible to know if
    this 74% is driven by diverse model architectures or simply standard LLM sampling variance.

    '
  recommendation: 'Run a control group: R1=Claude, R2=Claude, R3=Claude. Compare the single-run-only rate of the control group
    against the multi-model group to isolate the actual marginal value of model diversity.'
- id: F-003
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: medium
  watchdog: none
  slopodar: loom-speed
  title: Greedy string matching on titles is brittle
  description: 'difflib.SequenceMatcher weighted heavily to titles (0.7) will fail to match findings where models identified
    the exact same defect but used different vocabulary (e.g. ''SQL Injection'' vs ''Unsanitized query payload''). It is also
    order-dependent.

    '
  recommendation: Replace difflib with a semantic matching step (LLM-as-a-judge) to cluster functionally identical findings,
    or manually audit the first N=100 findings to establish a known false-negative match rate for the string algorithm.
