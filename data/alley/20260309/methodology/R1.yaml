findings:
- id: F-001
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: critical
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: 0% FP rate is unmeasured, not measured
  description: 'The false positive rate defaults all findings to ''confirmed true'' pending human verification. Claiming 0%
    FP under these conditions is a paper guardrail by the team''s own taxonomy — a stated metric with no enforcement mechanism.
    This is the single most credibility-damaging claim in the methodology because it is trivially falsifiable upon inspection.

    '
  recommendation: Human-audit all 31 findings immediately. Report actual FP rate. Remove 0% claim until audit is complete.
- id: F-002
  branch: triangulation-methodology
  file: bin/triangulate
  line: n/a
  severity: critical
  watchdog: WD-PG
  slopodar: shadow-validation
  title: Matching algorithm unvalidated — all quantitative claims depend on it
  description: 'The greedy SequenceMatcher-based matching is order-dependent, uses unvalidated weights (0.3/0.7) and threshold
    (0.6), and has no measured false match or missed match rate. Every downstream metric — convergence rate, unique finding
    count, marginal value curve — is a function of this matcher. An unvalidated instrument produces unvalidated measurements.

    '
  recommendation: Switch to stable matching (Hungarian algorithm). Run sensitivity analysis on threshold [0.4-0.8]. Human-validate
    all 31 matches/non-matches.
- id: F-003
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: critical
  watchdog: none
  slopodar: none
  title: 'No baseline: same-model-3x comparison missing'
  description: 'The 74% single-model uniqueness rate is the central claim, but without a same-model-3x baseline, it is impossible
    to distinguish cross-model diversity from stochastic review variation. If 3 runs of Claude with different seeds produce
    a similar uniqueness rate, the entire cross-model rationale collapses. This is the single most important experiment to
    run.

    '
  recommendation: Run Claude 3 times on the same diff with temperature >0 or varied system prompts. Compare single-run uniqueness
    rate to cross-model uniqueness rate.
- id: F-004
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: WD-CB
  slopodar: none
  title: N=1 codebase with generalisation language
  description: 'All claims are derived from a single codebase, a single code author (Claude polecats), a single review prompt,
    and a single snapshot. The blind spot map, diminishing returns curve, and category distribution are observations from
    one case, not generalisable findings. Confidence intervals on the 74% rate span [55%, 88%] at 95% confidence. The ''Semantic
    Hallucination is Claude-only'' claim rests on 3 instances — insufficient for any statistical test.

    '
  recommendation: Reframe all claims as case study observations. Use language like 'we observed' not 'we found.' State sample
    sizes alongside every claim. Reserve generalisation for after multi-codebase replication.
- id: F-005
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: none
  slopodar: none
  title: Human delta confounded by priming and residual effects
  description: 'DP-3 (Human Delta) measures what humans find AFTER seeing model findings on FIXED code. The human is primed
    by knowledge of model categories and operates on a different defect population (post-fix residuals). The counterfactual
    — what the human would find on raw code without model exposure — is not measured and cannot be recovered from this design.

    '
  recommendation: Either add a blind human review arm (same raw diff, no model findings) or reframe DP-3 as 'human residual
    value after model review' with explicit acknowledgement of the priming confound.
- id: F-006
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: high
  watchdog: none
  slopodar: none
  title: Cost-benefit analysis contains no cost data
  description: 'DP-4 claims a cost-benefit analysis but includes no cost measurements — no API token costs, no human dispatch
    time, no wall-clock latency, no opportunity cost comparison. Without costs, this is a benefit-only analysis. The most
    important missing comparison is same-model-3x vs cross-model-3x at equivalent token budget.

    '
  recommendation: Log and report actual API costs per review. Estimate severity-weighted value per finding. Rename to 'benefit
    analysis' until cost term is populated.
- id: F-007
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: medium
  watchdog: WD-TDF
  slopodar: none
  title: Convergence may measure training data overlap, not independent verification
  description: 'The single 3-way convergent finding (applyCreditDelta non-transactional) maps to a well-known pattern (database
    atomicity) present in training corpora for all three models. Convergence on template-derivable findings is expected and
    does not demonstrate independent analytical capability. The signal value of convergence varies by finding type but this
    distinction is not made.

    '
  recommendation: Classify convergent findings as 'template-derived' (maps to known vulnerability pattern) vs 'analysis-derived'
    (codebase-specific structural defect). Only analysis-derived convergence supports the independent verification claim.
- id: F-008
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: medium
  watchdog: none
  slopodar: none
  title: Finding count asymmetry confounds uniqueness rate
  description: 'Claude produced 18 findings, Gemini 6, Codex 11. A more verbose model mechanically produces more unmatched
    findings regardless of quality. The uniqueness rate is partially an artefact of count asymmetry. Normalisation (unique
    findings as fraction of that model''s total) or rate-based metrics would partially address this.

    '
  recommendation: Report normalised uniqueness rates alongside absolute counts. Investigate whether Gemini's lower count reflects
    capability, prompt handling, or context window differences.
- id: F-009
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: medium
  watchdog: none
  slopodar: none
  title: Taxonomy priming may bias category distribution across models
  description: 'All reviewers receive the Watchdog taxonomy and Slopodar patterns. Different models may respond differently
    to categorical priming — one model may anchor more heavily on provided category names than another. The observed category
    distribution may partially reflect differential priming response rather than differential detection capability.

    '
  recommendation: 'Consider a control condition: one run without the taxonomy (free-form findings) compared to one run with
    it. If infeasible, acknowledge priming as a confound in the blind spot map.'
- id: F-010
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: medium
  watchdog: none
  slopodar: none
  title: Author-reviewer model family correlation uncontrolled
  description: 'Code is authored by Claude polecats and reviewed by Claude Opus among others. A model reviewing its own family''s
    output may have correlated blind spots (monoculture risk) or privileged insight into its own failure modes. The direction
    of this bias is unknown and uncontrolled. Claude''s higher finding count (18 vs 6/11) could reflect either effect.

    '
  recommendation: Acknowledge the correlation. In future runs on non-Claude-authored code, compare Claude's finding rate to
    establish whether the asymmetry is stable or author-dependent.
- id: F-011
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: low
  watchdog: none
  slopodar: none
  title: Severity calibration metric uses ordinal distance instead of weighted kappa
  description: 'Metric 6 measures inter-rater severity agreement using ordinal distance between ratings. This treats all adjacent-level
    disagreements as equal (critical-high = medium-low). Cohen''s weighted kappa or Krippendorff''s alpha would be more informative
    and are standard for ordinal inter-rater agreement.

    '
  recommendation: Use Cohen's weighted kappa for severity calibration. Report both the kappa statistic and the raw agreement
    table.
- id: F-012
  branch: triangulation-methodology
  file: docs/internal/weaver/darkcat-alley.md
  line: n/a
  severity: low
  watchdog: none
  slopodar: none
  title: Model version temporal instability not acknowledged
  description: 'The blind spot map and category distribution are snapshots of specific model versions (Claude Opus, Gemini
    3.1, Codex 52) at a specific date. Model updates may change these profiles. The shelf life of the findings is not discussed.

    '
  recommendation: Date-stamp all findings and note model versions explicitly. Acknowledge that the blind spot map requires
    re-validation when model versions change.
