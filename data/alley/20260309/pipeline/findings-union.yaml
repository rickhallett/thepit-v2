- title: Greedy matching is order-dependent and non-commutative
  file: bin/triangulate
  severity: high
  found_by:
  - R1
  - R2
  - R3
  convergence_count: 3
  details:
    R1:
      id: F-001
      severity: high
      watchdog: WD-PL
      slopodar: shadow-validation
      description: 'match_findings uses greedy first-come-first-served assignment. The iteration order depends on dict insertion
        order of the reviews argument, which depends on CLI argument position. Swapping R1 and R2 at the CLI can produce different
        convergence numbers. For a tool whose output feeds portfolio visualisations, non-deterministic results undermine defensibility.
        The algorithm also only compares candidates against the group seed, not all group members, producing false negatives
        when reviewers use different vocabulary for the same issue.

        '
    R2:
      id: F-003
      severity: medium
      watchdog: WD-CB
      slopodar: none
      description: 'The matching algorithm combines file similarity (0.3) and title similarity (0.7). If the file path matches
        exactly (score 1.0), the combined score is already 0.3. To cross the 0.6 threshold, the title only needs a 0.428 similarity.
        This means distinct bugs within the same file that have vaguely similar titles will be incorrectly merged into a single
        finding.

        '
    R3:
      id: F-001
      severity: high
      watchdog: WD-PL
      slopodar: shadow-validation
      description: 'match_findings uses a single-pass greedy clustering with SequenceMatcher. The first acceptable match absorbs
        a finding, preventing better later matches. This can collapse distinct findings into one group or split true duplicates,
        depending on the order of all_findings. Convergence metrics and marginal value then reflect matching artifacts rather
        than reviewer overlap.

        '
- title: Seed-only similarity comparison produces false negatives
  file: bin/triangulate
  severity: critical
  found_by:
  - R1
  - R2
  convergence_count: 2
  details:
    R1:
      id: F-002
      severity: high
      watchdog: WD-PL
      slopodar: shadow-validation
      description: 'The inner matching loop compares f_j against f_i (the seed) only. Two findings that are both similar to
        a third but dissimilar to each other will not be grouped. This is the primary failure mode of the matching algorithm:
        R1 says ''missing error handling'', R2 says ''lacks try-catch blocks'', R3 says ''no error handling''. R1-R3 match,
        R1-R2 might not, so R2 ends up as a separate single-model finding despite describing the same issue.

        '
    R2:
      id: F-001
      severity: critical
      watchdog: WD-LRT
      slopodar: right-answer-wrong-work
      description: 'In Metric 6, `severities_seen` uses `model_name` as the dictionary key. If multiple review files share
        the same `model` string (e.g., evaluating non-determinism across 3 runs of gpt-4), the severities will overwrite each
        other. This leads to artificially small sets and phantom agreement (`len(set(ordinals)) == 1`), hiding actual calibration
        disagreements.

        '
- title: Marginal value computed for single ordering only
  file: bin/triangulate
  severity: high
  found_by:
  - R1
  - R3
  convergence_count: 2
  details:
    R1:
      id: F-003
      severity: high
      watchdog: WD-PG
      slopodar: phantom-ledger
      description: 'The marginal value metric answers ''what does the Nth review add?'' but only for the ordering determined
        by CLI argument position. The first review always gets credit for the most findings. With 3 reviews there are 6 possible
        orderings; the tool computes 1. The resulting line chart will show a declining curve that is partly an artifact of
        evaluation order, not a true measurement of diminishing returns. This is the most misleading metric in the tool.

        '
    R3:
      id: F-002
      severity: medium
      watchdog: WD-PL
      slopodar: paper-guardrail
      description: 'Marginal value is computed by iterating groups in their existing order, which depends on file read order
        and the greedy matcher. This makes the cumulative curve non-deterministic across equivalent inputs and biases the
        "value of the nth reviewer" interpretation.

        '
- title: False positive rate outputs measured-looking zeros instead of null
  file: bin/triangulate
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-004
      severity: medium
      watchdog: WD-PG
      slopodar: phantom-ledger
      description: 'The FP rate metric defaults all findings to confirmed_true=total, confirmed_false=0, fp_rate=0.0. Downstream
        consumers will render this as ''0% false positive rate'' which implies empirical verification that has not occurred.
        This is a phantom ledger: the books show a clean audit trail that doesn''t correspond to any actual audit.

        '
- title: Finding validation checks presence but not types
  file: bin/triangulate
  severity: medium
  found_by:
  - R1
  - R2
  - R3
  convergence_count: 3
  details:
    R1:
      id: F-005
      severity: medium
      watchdog: WD-CB
      slopodar: paper-guardrail
      description: 'validate_finding checks that required fields exist but does not validate their types. severity: 42, line:
        [1,2,3], or title: true (parsed as boolean by YAML) will pass validation or produce confusing warning messages. The
        watchdog field is validated against a set but only as string membership — a list value would produce a misleading
        warning. No ID format validation (F-NNN expected). No duplicate ID detection within or across reviews.

        '
    R2:
      id: F-004
      severity: medium
      watchdog: WD-PL
      slopodar: paper-guardrail
      description: '`validate_review` checks for `model`, `date`, and `branches`, but ignores `base_commit` which is required
        by the schema. Similarly, `validate_finding` strictly checks `watchdog` against a constant set, but does not validate
        the `slopodar` field against known patterns, allowing typos to corrupt downstream analytics.

        '
    R3:
      id: F-004
      severity: low
      watchdog: WD-DC
      slopodar: paper-guardrail
      description: 'validate_finding checks presence and enum membership but not data types or formats. Non-dict entries or
        non-string line values can pass and later break downstream tools. base_commit is required by spec but not validated.

        '
- title: No inter-rater reliability statistic (kappa)
  file: bin/triangulate
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-006
      severity: medium
      watchdog: none
      slopodar: none
      description: 'The tool computes severity agreement as a binary (agree/disagree) and max_delta. It does not compute Cohen''s
        or Fleiss'' kappa, which is the standard measure for inter-rater reliability. The portfolio audience (Anthropic red
        team, ML researchers) will expect this metric. Its absence signals either unfamiliarity with the standard or deliberate
        avoidance — neither is a good signal.

        '
