- title: findings-union.yaml silently drops recommendation and line fields
  file: bin/triangulate
  severity: high
  found_by:
  - R2
  convergence_count: 1
  details:
    R2:
      id: F-002
      severity: high
      watchdog: WD-PG
      slopodar: shadow-validation
      description: 'In `export_all`, when constructing the deduplicated union, the `details` dict explicitly extracts `id`,
        `severity`, `watchdog`, `slopodar`, and `description`, but completely drops `recommendation` and `line`. This breaks
        the utility of the union export for human reviewers attempting to fix the codebase.

        '
- title: Multi-line strings break YAML readability in export
  file: bin/triangulate
  severity: low
  found_by:
  - R2
  convergence_count: 1
  details:
    R2:
      id: F-005
      severity: low
      watchdog: WD-SH
      slopodar: none
      description: '`write_yaml` uses the default PyYAML dumper. Without a custom representer for multiline strings, fields
        like `description` and `recommendation` will be serialized as single strings with explicit `\n` characters or wrapped
        in double quotes. This makes the generated YAML files unreadable for humans.

        '
- title: Fragile CLI argument parsing crashes on optional flags before positionals
  file: bin/triangulate
  severity: low
  found_by:
  - R2
  convergence_count: 1
  details:
    R2:
      id: F-006
      severity: low
      watchdog: WD-LRT
      slopodar: none
      description: 'Functions like `cmd_summary` and `cmd_export` assume the first three arguments are review files, manually
        indexing `args[0:3]`. They iterate over `args` looking for optional flags. If a user provides flags first (e.g., `triangulate
        export --out dir r1 r2 r3`), the tool tries to open `--out` as a file and crashes.

        '
