review:
  model: gemini-3.1-pro-preview
  date: '2026-03-09'
  branches:
  - numerical-pipeline
  base_commit: unknown
findings:
- id: F-001
  branch: numerical-pipeline
  file: bin/triangulate
  line: 348-350
  severity: critical
  watchdog: WD-LRT
  slopodar: right-answer-wrong-work
  title: Severity calibration drops data due to model_name dict key
  description: 'In Metric 6, `severities_seen` uses `model_name` as the dictionary key. If multiple review files share the
    same `model` string (e.g., evaluating non-determinism across 3 runs of gpt-4), the severities will overwrite each other.
    This leads to artificially small sets and phantom agreement (`len(set(ordinals)) == 1`), hiding actual calibration disagreements.

    '
  recommendation: Key `severities_seen` by `rid` (Review ID) instead of `model_name`.
- id: F-002
  branch: numerical-pipeline
  file: bin/triangulate
  line: 580-586
  severity: high
  watchdog: WD-PG
  slopodar: shadow-validation
  title: findings-union.yaml silently drops recommendation and line fields
  description: 'In `export_all`, when constructing the deduplicated union, the `details` dict explicitly extracts `id`, `severity`,
    `watchdog`, `slopodar`, and `description`, but completely drops `recommendation` and `line`. This breaks the utility of
    the union export for human reviewers attempting to fix the codebase.

    '
  recommendation: 'Add `recommendation: f.get(''recommendation'')` and `line: f.get(''line'')` to the detail extraction dictionary.'
- id: F-003
  branch: numerical-pipeline
  file: bin/triangulate
  line: 223-228
  severity: medium
  watchdog: WD-CB
  slopodar: none
  title: Greedy matching algorithm is order-dependent and prone to false positives
  description: 'The matching algorithm combines file similarity (0.3) and title similarity (0.7). If the file path matches
    exactly (score 1.0), the combined score is already 0.3. To cross the 0.6 threshold, the title only needs a 0.428 similarity.
    This means distinct bugs within the same file that have vaguely similar titles will be incorrectly merged into a single
    finding.

    '
  recommendation: Increase the threshold to 0.75, or adjust the weights to demand higher title similarity when the file path
    is identical.
- id: F-004
  branch: numerical-pipeline
  file: bin/triangulate
  line: 133-146
  severity: medium
  watchdog: WD-PL
  slopodar: paper-guardrail
  title: Validation misses base_commit and slopodar enumerations
  description: '`validate_review` checks for `model`, `date`, and `branches`, but ignores `base_commit` which is required
    by the schema. Similarly, `validate_finding` strictly checks `watchdog` against a constant set, but does not validate
    the `slopodar` field against known patterns, allowing typos to corrupt downstream analytics.

    '
  recommendation: Add `base_commit` to metadata validation loop, and add a `VALID_SLOPODAR` set to validate `slopodar` values.
- id: F-005
  branch: numerical-pipeline
  file: bin/triangulate
  line: 599-602
  severity: low
  watchdog: WD-SH
  slopodar: none
  title: Multi-line strings break YAML readability in export
  description: '`write_yaml` uses the default PyYAML dumper. Without a custom representer for multiline strings, fields like
    `description` and `recommendation` will be serialized as single strings with explicit `\n` characters or wrapped in double
    quotes. This makes the generated YAML files unreadable for humans.

    '
  recommendation: 'Add a block scalar representer to the YAML dumper for strings containing `

    ` to force literal block style (`|`).'
- id: F-006
  branch: numerical-pipeline
  file: bin/triangulate
  line: 676-679
  severity: low
  watchdog: WD-LRT
  slopodar: none
  title: Fragile CLI argument parsing crashes on optional flags before positionals
  description: 'Functions like `cmd_summary` and `cmd_export` assume the first three arguments are review files, manually
    indexing `args[0:3]`. They iterate over `args` looking for optional flags. If a user provides flags first (e.g., `triangulate
    export --out dir r1 r2 r3`), the tool tries to open `--out` as a file and crashes.

    '
  recommendation: Use Python's built-in `argparse` module for robust CLI argument and flag handling.
- id: F-007
  branch: numerical-pipeline
  file: bin/triangulate
  line: 790-805
  severity: medium
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: Metric 7 (Pre-QA vs Post-QA delta) is missing from implementation
  description: "The documentation claims the tool computes 8 metrics, specifically defining Metric 7 as 'Pre-QA vs Post-QA\
    \ delta' for a Sankey diagram. However, the codebase contains absolutely no logic to compare two runs or generate this\
    \ metric. \n"
  recommendation: Implement a cross-run comparison capability or remove Metric 7 from the documentation.
