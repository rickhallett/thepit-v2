- title: Short links endpoint has no rate limiting
  file: app/api/short-links/route.ts
  severity: medium
  found_by:
  - R1
  convergence_count: 1
  details:
    R1:
      id: F-001
      severity: medium
      watchdog: WD-CB
      slopodar: none
      description: 'Every other mutation endpoint in the diff has rate limiting (reactions: 30/min, votes: 60/hr). Short link
        creation has none. Unauthenticated, hits DB on every call. Idempotency prevents data corruption but not DB load from
        enumeration/DoS.

        '
- title: x-forwarded-for trusted without proxy trust boundary documentation
  file: app/api/reactions/route.ts
  severity: high
  found_by:
  - R1
  - R2
  convergence_count: 2
  details:
    R1:
      id: F-002
      severity: high
      watchdog: WD-PG
      slopodar: paper-guardrail
      description: 'getClientIp trusts x-forwarded-for directly, taking first IP in chain. Without upstream proxy stripping,
        any client can spoof their IP to bypass rate limiting and impersonate other users'' reaction fingerprints. Falls back
        to 127.0.0.1 if no headers present, collapsing all users.

        '
    R2:
      id: F-004
      severity: high
      watchdog: WD-LRT
      slopodar: none
      description: 'Reaction fingerprinting and rate limiting use x-forwarded-for with a fallback to 127.0.0.1.  On proxies
        that don''t pass these headers, all clients collapse into a single identity.

        '
