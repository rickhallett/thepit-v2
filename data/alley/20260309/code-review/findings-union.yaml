- title: Rate limiter keys on raw IP while fingerprint uses hashed IP
  file: app/api/reactions/route.ts
  severity: medium
  found_by:
  - R1
  - R3
  convergence_count: 2
  details:
    R1:
      id: F-008
      severity: medium
      watchdog: WD-LRT
      slopodar: none
      description: 'Rate limiting uses raw ip as the key. Reaction identity uses computeFingerprint(userId, ip) which is a
        hashed derivative. If proxy doesn''t set forwarding headers, all anonymous users collapse to 127.0.0.1, sharing both
        rate limit and fingerprint identity.

        '
    R3:
      id: F-001
      severity: medium
      watchdog: WD-PG
      slopodar: paper-guardrail
      description: 'The rate limiter keys solely on getClientIp(), which trusts the client-supplied x-forwarded-for header.
        Unless the platform is stripping or overwriting this header, clients can spoof IPs and bypass the 30/min limit and
        anonymous fingerprinting.

        '
