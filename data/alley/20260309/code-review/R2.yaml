review:
  model: gemini
  date: '2026-03-09'
  branches:
  - phase2-ui
  - phase4-economy
  - phase5-discovery
  base_commit: unknown
findings:
- id: F-001
  branch: phase4-economy
  file: lib/credits/balance.ts
  line: n/a
  severity: critical
  watchdog: WD-PL
  slopodar: phantom-ledger
  title: applyCreditDelta UPDATE+INSERT not wrapped in db.transaction()
  description: 'Balance UPDATE and transaction INSERT are separate queries. If INSERT fails after UPDATE, balance is modified
    without audit trail.

    '
  recommendation: Wrap in db.transaction(async (tx) => { ... })
- id: F-002
  branch: phase4-economy
  file: lib/credits/preauth.ts
  line: n/a
  severity: critical
  watchdog: WD-PL
  slopodar: phantom-ledger
  title: preauthorizeCredits UPDATE+INSERT not wrapped in db.transaction()
  description: 'Balance UPDATE and transaction INSERT are executed without a transaction. Failing halfway through results
    in modified balances without an audit ledger entry.

    '
  recommendation: Wrap in db.transaction(async (tx) => { ... })
- id: F-003
  branch: phase4-economy
  file: db/schema.ts
  line: n/a
  severity: high
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: credit_transactions.reference_id has no UNIQUE constraint
  description: 'Webhook handlers claim idempotency via reference_id check, but the column allows duplicates at DB level. Concurrent
    webhook deliveries can double-grant credits.

    '
  recommendation: Add .unique() to reference_id column definition
- id: F-004
  branch: phase5-discovery
  file: app/api/reactions/route.ts
  line: n/a
  severity: high
  watchdog: WD-LRT
  slopodar: none
  title: x-forwarded-for proxy collapse on rate limit/identity
  description: 'Reaction fingerprinting and rate limiting use x-forwarded-for with a fallback to 127.0.0.1.  On proxies that
    don''t pass these headers, all clients collapse into a single identity.

    '
  recommendation: Implement robust client fingerprinting or validate proxy configurations.
- id: F-005
  branch: phase4-economy
  file: app/api/credits/webhook/route.ts
  line: n/a
  severity: high
  watchdog: WD-CB
  slopodar: none
  title: Webhook route hard-asserts env vars causing 500 errors
  description: 'STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET are asserted at the module level. Missing environment variables
    will cause an unhandled 500 error on instantiation instead of failing gracefully.

    '
  recommendation: Move environment variable assertions to app startup or handle gracefully.
- id: F-006
  branch: phase4-economy
  file: lib/credits/intro-pool.ts
  line: n/a
  severity: high
  watchdog: WD-CB
  slopodar: shadow-validation
  title: Intro pool UPDATE without WHERE clause updates all rows
  description: 'If the intro pool table ever contains more than 1 row (violating the singleton assumption),  the naked UPDATE
    will modify all rows, causing silent data corruption.

    '
  recommendation: Add a WHERE clause or enforce a strict singleton constraint.
- id: F-007
  branch: phase5-discovery
  file: lib/agents/create.ts
  line: n/a
  severity: medium
  watchdog: WD-TDF
  slopodar: none
  title: Agent ID uses crypto.randomUUID().slice(0,21) instead of nanoid(21)
  description: 'Using sliced UUIDs changes the format and entropy characteristics compared to nanoid(21), which causes divergence
    and potential breakage if other components assume base62 format.

    '
  recommendation: Use nanoid(21) for consistent ID generation.
- id: F-008
  branch: phase2-ui
  file: lib/sharing/short-links.ts
  line: n/a
  severity: medium
  watchdog: WD-LRT
  slopodar: none
  title: createShortLink returns result.slug! which may throw
  description: 'If the insert is a no-op due to conflict, but the row is missing (e.g. deleted concurrently), the subsequent
    select will return empty, and the non-null assertion on result.slug! will throw.

    '
  recommendation: Handle undefined results gracefully before returning slug.
- id: F-009
  branch: phase5-discovery
  file: lib/engagement/reactions.ts
  line: n/a
  severity: high
  watchdog: WD-LRT
  slopodar: shadow-validation
  title: toggleReaction select-then-insert race condition
  description: 'Select-then-insert pattern is race-vulnerable. Concurrent requests will both see empty records and attempt
    to insert, causing 500 errors on unique constraint violations.

    '
  recommendation: Use INSERT ... ON CONFLICT DO NOTHING to ensure atomic operations.
- id: F-010
  branch: phase5-discovery
  file: lib/engagement/votes.ts
  line: n/a
  severity: medium
  watchdog: WD-LRT
  slopodar: none
  title: Winner vote rowCount from Drizzle insert may be undefined
  description: 'The code assumes Drizzle''s insert returns rowCount for conflict detection,  but some database drivers return
    undefined instead of 0 or 1.

    '
  recommendation: Validate driver behavior or use an explicit SELECT if rowCount is unavailable.
- id: F-011
  branch: phase2-ui
  file: lib/engagement/votes.ts
  line: n/a
  severity: medium
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: WinnerVoteRequestSchema missing .min(1) on IDs
  description: 'The Zod schema does not enforce .min(1) on boutId and agentId. Empty strings will pass validation unchecked.

    '
  recommendation: Append .min(1) to all required string fields in the schema.
- id: F-012
  branch: phase5-discovery
  file: app/b/[id]/page.tsx
  line: n/a
  severity: low
  watchdog: WD-CB
  slopodar: none
  title: /b/[id] uses length-based ID resolution
  description: 'The page uses hardcoded length assumptions (8 vs 21 characters) to distinguish between full IDs and short
    links, which is brittle and will break if ID formats change.

    '
  recommendation: Use explicit prefixing (e.g., 'slug_') or robust format validators.
- id: F-013
  branch: phase2-ui
  file: components/engagement/share-panel.tsx
  line: n/a
  severity: low
  watchdog: WD-CB
  slopodar: shadow-validation
  title: SharePanel navigator.clipboard lacks fallback
  description: 'The copy functionality relies exclusively on navigator.clipboard without error handling. Secure-context failures
    (like HTTP or nested iframes) will silently no-op.

    '
  recommendation: Add a try/catch block and fallback error UI.
- id: F-014
  branch: phase5-discovery
  file: lib/engagement/leaderboard.ts
  line: n/a
  severity: low
  watchdog: WD-TDF
  slopodar: none
  title: Leaderboard in-memory aggregation
  description: 'The leaderboard aggregates votes in application memory via Maps instead of using SQL GROUP BY, which will
    scale poorly as vote volume grows.

    '
  recommendation: Rewrite query to perform aggregation inside the database.
