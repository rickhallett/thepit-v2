review:
  model: claude (claude-opus-4-6)
  date: '2026-03-09'
  branches:
  - phase2-ui
  base_commit: unknown
findings:
- id: F-001
  branch: phase2-ui
  file: app/api/short-links/route.ts
  line: 1-51
  severity: medium
  watchdog: WD-CB
  slopodar: none
  title: Short links endpoint has no rate limiting
  description: 'Every other mutation endpoint in the diff has rate limiting (reactions: 30/min, votes: 60/hr). Short link
    creation has none. Unauthenticated, hits DB on every call. Idempotency prevents data corruption but not DB load from enumeration/DoS.

    '
  recommendation: Add rate limiter (e.g., 10/min per IP) matching the pattern in reactions/votes routes
- id: F-002
  branch: phase2-ui
  file: app/api/reactions/route.ts
  line: 281-292
  severity: high
  watchdog: WD-PG
  slopodar: paper-guardrail
  title: x-forwarded-for trusted without proxy trust boundary documentation
  description: 'getClientIp trusts x-forwarded-for directly, taking first IP in chain. Without upstream proxy stripping, any
    client can spoof their IP to bypass rate limiting and impersonate other users'' reaction fingerprints. Falls back to 127.0.0.1
    if no headers present, collapsing all users.

    '
  recommendation: Document the proxy trust assumption. Consider validating IP format. Add comment noting Vercel-specific behaviour.
- id: F-003
  branch: phase2-ui
  file: app/api/winner-vote/route.ts
  line: '448'
  severity: low
  watchdog: WD-CB
  slopodar: none
  title: ALREADY_VOTED uses string literal instead of API_ERRORS constant
  description: 'All other error codes in the codebase use API_ERRORS.XXX constants. This one uses a raw string "ALREADY_VOTED".
    Inconsistent with the established pattern and invisible to grep-based error code auditing.

    '
  recommendation: Add ALREADY_VOTED to API_ERRORS constant object, or use API_ERRORS.CONFLICT
- id: F-004
  branch: phase2-ui
  file: app/api/reactions/route.ts
  line: 330-333
  severity: medium
  watchdog: WD-LRT
  slopodar: none
  title: Reaction toggle errors return opaque 500 for all failure modes
  description: 'The catch block returns a generic 500 for any toggleReaction error, including UNIQUE constraint violations
    from concurrent toggles. Compare with winner-vote route which has specific alreadyVoted handling. Two endpoints in the
    same domain handle conflicts differently.

    '
  recommendation: Catch specific error types (DB constraint violation) and return appropriate status codes (409 for conflict)
- id: F-005
  branch: phase2-ui
  file: components/engagement/share-panel.tsx
  line: '87'
  severity: low
  watchdog: WD-LRT
  slopodar: none
  title: navigator.clipboard.writeText has no error handling
  description: 'navigator.clipboard requires secure context (HTTPS) and can throw in iframes, sandboxed contexts, or when
    permission is denied. The await will throw uncaught, silently breaking the copy button without user feedback.

    '
  recommendation: Wrap in try/catch, fall back to document.execCommand('copy') or show error toast
- id: F-006
  branch: phase2-ui
  file: components/leaderboard/leaderboard-table.tsx
  line: 1-185
  severity: low
  watchdog: WD-CB
  slopodar: none
  title: Leaderboard uses black/white/gray palette inconsistent with app stone palette
  description: 'The leaderboard uses bg-white, bg-gray-50, bg-black, border-2 border-black. The rest of the app uses stone-*
    variants (bg-stone-900, bg-stone-800, text-stone-400). Visually jarring — component looks like it belongs to a different
    application.

    '
  recommendation: Replace with stone palette to match arena, message-card, and preset-card components
- id: F-007
  branch: phase2-ui
  file: components/arena/preset-card.tsx
  line: 2000-2006
  severity: low
  watchdog: none
  slopodar: none
  title: PresetCard isSubmitting has no timeout or error recovery
  description: 'If router.push fails silently, the button stays permanently disabled with text "Starting..." and no way for
    the user to retry. No timeout, no error handling on the navigation call.

    '
  recommendation: Add try/catch around router.push with setIsSubmitting(false) on failure, or add a timeout reset
- id: F-008
  branch: phase2-ui
  file: app/api/reactions/route.ts
  line: 307-310
  severity: medium
  watchdog: WD-LRT
  slopodar: none
  title: Rate limiter keys on raw IP while fingerprint uses hashed IP
  description: 'Rate limiting uses raw ip as the key. Reaction identity uses computeFingerprint(userId, ip) which is a hashed
    derivative. If proxy doesn''t set forwarding headers, all anonymous users collapse to 127.0.0.1, sharing both rate limit
    and fingerprint identity.

    '
  recommendation: Document the proxy dependency. Consider keying rate limit on fingerprint for consistency.
- id: F-009
  branch: phase2-ui
  file: app/api/short-links/route.ts
  line: 1-51
  severity: low
  watchdog: WD-CB
  slopodar: none
  title: Short link creation accepts non-completed bouts
  description: 'The endpoint verifies bout existence but not bout status. Short links can be created for bouts that are still
    running, pending, or failed. Sharing a link to an in-progress bout may produce a poor user experience on the replay page.

    '
  recommendation: 'Add status check: only create short links for completed bouts, or document the intentional behaviour'
- id: F-010
  branch: phase2-ui
  file: app/leaderboard/page.tsx
  line: '589'
  severity: low
  watchdog: none
  slopodar: none
  title: Leaderboard page has no caching — queries DB on every request
  description: 'getLeaderboardData is called in a server component with no caching directive (no revalidate, no cache headers).
    Combined with the prior finding that leaderboard does in-memory aggregation, every page load fetches and aggregates all
    votes. Will not scale.

    '
  recommendation: Add ISR revalidation (e.g., revalidate = 60) or cache the aggregation result
- id: F-011
  branch: phase2-ui
  file: components/arena/message-card.tsx
  line: 31-34
  severity: low
  watchdog: WD-SH
  slopodar: none
  title: Reaction key format assumes turnIndex:type but has no type documentation
  description: 'userReactions is a Set<string> with keys like "0:heart", "1:fire". The key format is constructed in MessageCard
    (turnIndex + ":" + type) but there is no type definition, comment, or shared constant defining this format. The parent
    component must know to construct the same format. Fragile coupling via implicit string convention.

    '
  recommendation: Extract key generation to a shared utility function or document the convention
- id: F-012
  branch: phase2-ui
  file: components/engagement/share-panel.tsx
  line: 23-39
  severity: low
  watchdog: none
  slopodar: none
  title: SharePanel creates short link on every mount without deduplication
  description: 'The useEffect fires on mount and POSTs to /api/short-links. In React strict mode (dev) or on parent re-renders,
    this fires multiple times. The API is idempotent so no data issues, but unnecessary network traffic. No AbortController
    cleanup on unmount — response may arrive after unmount.

    '
  recommendation: Add AbortController cleanup in useEffect return. Consider caching the slug in parent state.
- id: F-013
  branch: phase2-ui
  file: app/b/[id]/page.tsx
  line: 509-522
  severity: low
  watchdog: none
  slopodar: none
  title: Short link redirect has no caching — DB lookup on every access
  description: 'Every short link access queries resolveShortLink with no caching. Short link mappings are immutable (same
    boutId always returns same slug), so this is a missed caching opportunity. High-traffic shared links will repeatedly hit
    the database for the same lookup.

    '
  recommendation: Add Cache-Control or use Next.js revalidation for this route
